<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money — Your Simple Finance Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============ Design tokens — "Money Jar" theme ============
   A tactile, ledger-and-coin-jar identity for everyday people, not a
   generic fintech dashboard: warm stone paper, moss-green growth,
   wine-red spending, honey-gold highlights. Fraunces (soft serif) for
   big numbers, Space Grotesk for UI text, Space Mono for tabular figures. */
:root{
  --bg: #EEF0E6;
  --surface: #FBFAF3;
  --surface-glass: rgba(251,250,243,0.72);
  --ink: #202B22;
  --muted: #6C7566;
  --line: #DBDACB;
  --accent: #4C7A5A;
  --accent-ink: #223A2A;
  --accent-soft: #DEE9DD;
  --coral: #8C3B4A;
  --coral-soft: #F3DFDF;
  --gold: #D6A23C;
  --gold-soft: #F6E7C8;
  --info: #3E7C74;
  --info-soft: #DCEBE7;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 10px 28px rgba(32,43,34,0.08), 0 3px 8px rgba(32,43,34,0.05);
  --shadow-lift: 0 18px 44px rgba(32,43,34,0.16);
  --dur: 220ms;
  --ease: cubic-bezier(.4,0,.2,1);
  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body: 'Space Grotesk', 'Segoe UI', sans-serif;
  --font-mono: 'Space Mono', ui-monospace, monospace;
}

[data-theme="dark"]{
  --bg: #141B15;
  --surface: #1C251D;
  --surface-glass: rgba(28,37,29,0.72);
  --ink: #EAF0E6;
  --muted: #96A38F;
  --line: #2C372C;
  --accent: #74AE87;
  --accent-ink: #E7F4EA;
  --accent-soft: #223B2B;
  --coral: #D98A93;
  --coral-soft: #3B2224;
  --gold: #E8BE6E;
  --gold-soft: #3A2F17;
  --info: #7FBDB2;
  --info-soft: #1F3833;
  --shadow: 0 10px 28px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.25);
  --shadow-lift: 0 18px 44px rgba(0,0,0,0.45);
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
h1,h2,h3,h4{ font-family:var(--font-display); margin:0; letter-spacing:-0.01em; }
button, input, select{ font-family:inherit; }
.mono{ font-family:var(--font-mono); font-variant-numeric: tabular-nums; }
a{ color:inherit; }
::selection{ background:var(--accent); color:#fff; }

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

/* ============ Utility ============ */
.hidden{ display:none !important; }
.btn{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 18px; border-radius:999px; border:none;
  font-size:14px; font-weight:600; cursor:pointer;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
  background:var(--surface); color:var(--ink); border:1px solid var(--line);
}
.btn:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }
.btn:active{ transform:translateY(0); }
.btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.btn-primary{ background:var(--accent); color:#fff; border:none; }
.btn-primary:hover{ box-shadow:0 10px 24px rgba(76,122,90,0.35); }
.btn-danger{ background:var(--coral-soft); color:var(--coral); border:none; }
.btn-ghost{ background:transparent; border:1px solid transparent; }
.btn-ghost:hover{ background:var(--surface); box-shadow:none; }
.btn-sm{ padding:6px 12px; font-size:13px; }
.btn-icon{ width:38px; height:38px; padding:0; border-radius:12px; justify-content:center; }

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.field{ display:flex; flex-direction:column; gap:6px; }
.field label{ font-size:13px; font-weight:600; color:var(--muted); }
.field input, .field select, .field textarea{
  padding:11px 14px; border-radius:var(--radius-sm); border:1px solid var(--line);
  background:var(--bg); color:var(--ink); font-size:14px;
  transition: border-color var(--dur) var(--ease);
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:none; border-color:var(--accent);
}
.pill{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.pill-income{ background:var(--accent-soft); color:var(--accent-ink); }
.pill-expense{ background:var(--coral-soft); color:var(--coral); }

/* ============ Auth screen ============ */
#auth-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background:
    radial-gradient(circle at 15% 15%, var(--accent-soft), transparent 45%),
    radial-gradient(circle at 85% 85%, var(--coral-soft), transparent 45%),
    var(--bg);
}
.auth-box{ width:100%; max-width:400px; padding:36px 32px; text-align:center; }
.auth-logo{
  width:58px; height:58px; border-radius:18px; margin:0 auto 18px;
  background:linear-gradient(135deg, var(--accent-ink), var(--accent));
  display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff;
  box-shadow:0 10px 24px rgba(76,122,90,0.35);
}
.auth-box h1{ font-size:22px; margin-bottom:4px; }
.auth-box p.sub{ color:var(--muted); font-size:14px; margin-bottom:24px; }
.auth-tabs{ display:flex; background:var(--bg); border-radius:999px; padding:4px; margin-bottom:22px; }
.auth-tabs button{
  flex:1; border:none; background:transparent; padding:9px; border-radius:999px; font-weight:700;
  font-size:13px; color:var(--muted); cursor:pointer; transition:all var(--dur) var(--ease);
}
.auth-tabs button.active{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
.auth-form{ display:flex; flex-direction:column; gap:14px; text-align:left; }
.auth-error{ color:var(--coral); font-size:13px; min-height:16px; text-align:left; }
.auth-box .btn-primary{ width:100%; justify-content:center; padding:12px; margin-top:4px; }

/* ============ App shell ============ */
#app-shell{ display:flex; min-height:100vh; }

.sidebar{
  width:230px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--line);
  display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh;
}
.sidebar-logo{ display:flex; align-items:center; gap:10px; padding:6px 10px 22px; }
.sidebar-logo .mark{ width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg, var(--accent-ink), var(--accent)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-family:var(--font-display); }
.sidebar-logo span{ font-family:var(--font-display); font-weight:800; font-size:16px; }
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px;
  color:var(--muted); font-weight:600; font-size:14px; cursor:pointer; margin-bottom:2px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  border:none; background:transparent; width:100%; text-align:left;
}
.nav-item:hover{ background:var(--bg); color:var(--ink); }
.nav-item.active{ background:var(--accent-soft); color:var(--accent-ink); }
.nav-item .ic{ font-size:17px; width:20px; text-align:center; }
.sidebar-footer{ margin-top:auto; display:flex; flex-direction:column; gap:6px; }
.user-chip{ display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px; background:var(--bg); }
.user-chip .av{ width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.user-chip .name{ font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.main-area{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; gap:14px; padding:18px 28px; position:sticky; top:0;
  background:var(--surface-glass); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); z-index:5;
}
.topbar h2{ font-size:20px; flex-shrink:0; }
.search-box{ flex:1; max-width:360px; position:relative; }
.search-box input{ width:100%; padding:9px 14px 9px 36px; border-radius:999px; border:1px solid var(--line); background:var(--bg); color:var(--ink); font-size:13px; }
.search-box input:focus{ outline:none; border-color:var(--accent); }
.search-box .ic{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5; font-size:13px; }
.topbar-actions{ margin-left:auto; display:flex; align-items:center; gap:10px; }

.view{ padding:24px 28px 100px; animation: fadein var(--dur) var(--ease); }
@keyframes fadein{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }

/* ============ Dashboard ============ */
.hero-money{
  padding:26px 30px; display:flex; align-items:center; justify-content:space-between; gap:24px;
  background:linear-gradient(135deg, var(--accent-ink) 0%, var(--accent) 100%);
  color:#fff; margin-bottom:20px; position:relative; overflow:hidden;
}
.hero-money::after{
  content:''; position:absolute; right:-70px; top:-70px; width:240px; height:240px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
}
.hero-money .label{ font-size:12.5px; opacity:.8; font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-family:var(--font-body); }
.hero-money .amount{ font-size:40px; font-weight:600; font-family:var(--font-display); margin-top:4px; font-variant-numeric:tabular-nums; }

/* Signature element: a coin jar that fills up according to how much of your
   income you've kept this cycle — a literal, friendly stand-in for "savings". */
.jar-wrap{ position:relative; width:104px; height:128px; flex-shrink:0; z-index:1; }
.jar-svg .jar-outline{ fill:none; stroke:rgba(255,255,255,0.55); stroke-width:2.5; }
.jar-svg .jar-lid{ fill:rgba(255,255,255,0.28); }
.jar-svg .jar-liquid{ fill:var(--gold); transition:y 500ms var(--ease), height 500ms var(--ease); }
.jar-svg .jar-wave{ fill:rgba(255,255,255,0.55); }
.jar-caption{ text-align:center; margin-top:4px; font-size:11.5px; font-weight:600; opacity:.85; }
.jar-caption strong{ font-family:var(--font-display); font-size:14px; font-weight:600; display:block; }

.stat-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:16px; margin-bottom:20px; }
.stat-card{ padding:18px; }
.stat-card .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.stat-card .ic{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.stat-card .val{ font-size:22px; font-weight:800; font-family:var(--font-display); }
.stat-card .lbl{ font-size:12.5px; color:var(--muted); font-weight:600; }

.chart-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin-bottom:20px; }
.chart-card{ padding:18px; }
.chart-card h3{ font-size:14px; margin-bottom:12px; }
.chart-card canvas{ max-height:230px; }
@media (max-width: 900px){ .chart-grid{ grid-template-columns:1fr; } }

.list-card{ padding:6px 0; }
.list-card .list-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 18px; }
.list-card .list-head h3{ font-size:15px; }

.tx-row{ display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid var(--line); transition: background var(--dur); }
.tx-row:hover{ background:var(--bg); }
.tx-row .ic{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.tx-row .info{ flex:1; min-width:0; }
.tx-row .info .desc{ font-weight:700; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tx-row .info .meta{ font-size:12px; color:var(--muted); margin-top:2px; }
.tx-row .amt{ font-weight:800; font-size:14px; flex-shrink:0; }
.tx-row .amt.pos{ color:var(--accent); }
.tx-row .amt.neg{ color:var(--coral); }
.tx-row .row-actions{ display:flex; gap:4px; opacity:0; transition:opacity var(--dur); }
.tx-row:hover .row-actions{ opacity:1; }
.tx-row .attach-badge{ font-size:11px; color:var(--muted); margin-left:4px; }

.empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .big{ font-size:34px; margin-bottom:10px; }
.empty-state p{ font-size:13.5px; }

/* ============ Filter bar ============ */
.filter-bar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:end; }
.filter-bar .field{ min-width:150px; }

/* ============ Groups grid ============ */
.groups-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:14px; }
.group-tile{ padding:16px; display:flex; flex-direction:column; gap:8px; position:relative; }
.group-tile .ic{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.group-tile .name{ font-weight:700; font-size:14px; }
.group-tile .spend{ font-size:12px; color:var(--muted); }
.group-tile .tile-actions{ position:absolute; top:10px; right:10px; display:flex; gap:4px; opacity:0; transition:opacity var(--dur); }
.group-tile:hover .tile-actions{ opacity:1; }

/* ============ Budgets ============ */
.budget-row{ padding:16px 18px; border-top:1px solid var(--line); }
.budget-row:first-child{ border-top:none; }
.budget-row .top{ display:flex; justify-content:space-between; font-size:13.5px; font-weight:700; margin-bottom:8px; }
.budget-row .bar{ height:8px; border-radius:999px; background:var(--bg); overflow:hidden; }
.budget-row .bar .fill{ height:100%; border-radius:999px; background:var(--accent); transition:width var(--dur) var(--ease); }
.budget-row .bar .fill.over{ background:var(--coral); }
.budget-row .sub{ font-size:12px; color:var(--muted); margin-top:6px; }

/* ============ Currency table ============ */
.settings-section{ margin-bottom:24px; padding:20px; }
.settings-section h3{ font-size:15px; margin-bottom:14px; }
.cur-row{ display:grid; grid-template-columns:56px 1fr 90px 100px 40px; gap:10px; align-items:center; padding:8px 0; font-size:13.5px; }
.cur-row.head{ color:var(--muted); font-weight:700; font-size:12px; }
.theme-toggle{ display:flex; align-items:center; gap:10px; }
.switch{ width:44px; height:24px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; border:none; flex-shrink:0; }
.switch::after{ content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; left:3px; transition:transform var(--dur) var(--ease); box-shadow:0 1px 3px rgba(0,0,0,.3); }
.switch.on{ background:var(--accent); }
.switch.on::after{ transform:translateX(20px); }

/* ============ Modal ============ */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(6,15,12,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  animation: fadein var(--dur) var(--ease);
}
.modal{ width:100%; max-width:460px; padding:26px; max-height:88vh; overflow-y:auto; }
.modal h3{ font-size:18px; margin-bottom:18px; }
.modal .form-grid{ display:flex; flex-direction:column; gap:14px; }
.modal .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
.type-toggle{ display:flex; background:var(--bg); border-radius:12px; padding:4px; }
.type-toggle button{ flex:1; padding:9px; border-radius:9px; border:none; background:transparent; font-weight:700; font-size:13px; cursor:pointer; color:var(--muted); }
.type-toggle button.active-income{ background:var(--accent); color:#fff; }
.type-toggle button.active-expense{ background:var(--coral); color:#fff; }

.attach-drop{ border:1.5px dashed var(--line); border-radius:var(--radius-sm); padding:16px; text-align:center; font-size:13px; color:var(--muted); cursor:pointer; }
.attach-drop:hover{ border-color:var(--accent); color:var(--accent); }
.attach-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.attach-chip{ display:flex; align-items:center; gap:6px; padding:6px 10px; background:var(--bg); border-radius:999px; font-size:12px; }
.attach-chip button{ border:none; background:none; cursor:pointer; color:var(--coral); font-weight:700; }

/* ============ Toast ============ */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--ink); color:var(--bg); padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
  z-index:100; transition:all var(--dur) var(--ease); pointer-events:none; box-shadow:var(--shadow-lift);
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ============ Floating add + mobile bottom nav ============ */
.fab{
  position:fixed; bottom:26px; right:26px; width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:#fff; font-size:26px; border:none; box-shadow:var(--shadow-lift);
  cursor:pointer; display:none; align-items:center; justify-content:center; z-index:20;
  transition:transform var(--dur) var(--ease);
}
.fab:active{ transform:scale(.92); }

.bottom-nav{ display:none; }

@media (max-width: 860px){
  .sidebar{ display:none; }
  .fab{ display:flex; }
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--surface-glass); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); z-index:15; padding:8px 6px calc(env(safe-area-inset-bottom) + 6px);
  }
  .bottom-nav button{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10.5px; font-weight:700; color:var(--muted); padding:6px 2px; cursor:pointer;
  }
  .bottom-nav button.active{ color:var(--accent); }
  .bottom-nav .ic{ font-size:19px; }
  .view{ padding:18px 16px 110px; }
  .topbar{ padding:14px 16px; }
  .topbar h2{ font-size:17px; }
  .search-box{ display:none; }
  .chart-grid{ grid-template-columns:1fr; }
  .hero-money{ flex-direction:column; text-align:center; }
  .modal{ max-width:100%; }
}

.kbd-hint{ font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:2px 6px; font-family:var(--font-mono); }

</style>
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div id="auth-screen">
  <div class="auth-box card">
    <div class="auth-logo">🪙</div>
    <h1>Money</h1>
    <p class="sub">Your money, in a jar you can see.</p>

    <div class="auth-tabs">
      <button class="active" data-tab="login">Log In</button>
      <button data-tab="signup">Create New User</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="field">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <form id="signup-form" class="auth-form hidden">
      <div class="field">
        <label for="signup-username">Choose a Username</label>
        <input type="text" id="signup-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="signup-password">Choose a Password</label>
        <input type="password" id="signup-password" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="signup-password2">Confirm Password</label>
        <input type="password" id="signup-password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="app-shell" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="mark">M</div><span>Money</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="sidebar-user-chip"><div class="av"></div><div class="name"></div></div>
      <button class="btn btn-ghost btn-sm" id="btn-logout">🚪 Log Out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <h2 id="topbar-title">Home</h2>
      <div class="search-box">
        <span class="ic">🔍</span>
        <input type="text" id="global-search" placeholder="Search... (press /)">
      </div>
      <div class="topbar-actions">
        <button class="switch" id="theme-switch" title="Dark Mode"></button>
        <button class="btn btn-primary" id="btn-add-topbar">+ Add <span class="kbd-hint">N</span></button>
      </div>
    </header>
    <main id="view-root" class="view"></main>

/* db.js — IndexedDB wrapper. Falls back to localStorage if IndexedDB is unavailable. */

const DB_NAME = 'MoneyAppDB';
const DB_VERSION = 1;
const STORES = ['users', 'transactions', 'groups', 'budgets', 'currencies'];

let _db = null;
let _useLocalFallback = false;

function openDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      _useLocalFallback = true;
      resolve(null);
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach((store) => {
        if (!db.objectStoreNames.contains(store)) {
          const os = db.createObjectStore(store, { keyPath: 'id' });
          if (store !== 'users') os.createIndex('userId', 'userId', { unique: false });
        }
      });
    };
    req.onsuccess = (e) => {
      _db = e.target.result;
      resolve(_db);
    };
    req.onerror = () => {
      _useLocalFallback = true;
      resolve(null);
    };
  });
}

/* ---------- localStorage fallback helpers ---------- */
function lsGetAll(store) {
  try {
    return JSON.parse(localStorage.getItem('ls_' + store) || '[]');
  } catch (e) {
    return [];
  }
}
function lsSetAll(store, arr) {
  localStorage.setItem('ls_' + store, JSON.stringify(arr));
}

/* ---------- generic CRUD ---------- */
const DB = {
  async init() {
    await openDB();
  },

  async put(store, record) {
    if (_useLocalFallback) {
      const all = lsGetAll(store);
      const idx = all.findIndex((r) => r.id === record.id);
      if (idx >= 0) all[idx] = record;
      else all.push(record);
      lsSetAll(store, all);
      return record;
    }
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readwrite');
      tx.objectStore(store).put(record);
      tx.oncomplete = () => resolve(record);
      tx.onerror = () => reject(tx.error);
    });
  },

  async delete(store, id) {
    if (_useLocalFallback) {
      const all = lsGetAll(store).filter((r) => r.id !== id);
      lsSetAll(store, all);
      return true;
    }
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  },

  async getAll(store) {
    if (_useLocalFallback) return lsGetAll(store);
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  async getAllByUser(store, userId) {
    const all = await this.getAll(store);
    return all.filter((r) => r.userId === userId);
  },

  async get(store, id) {
    if (_useLocalFallback) return lsGetAll(store).find((r) => r.id === id) || null;
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
};

function uid(prefix = 'id') {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 9)}`;
}


/* auth.js — username/password auth with salted SHA-256 hashing (browser SubtleCrypto). */

const SESSION_KEY = 'moneyapp_session';

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf))
    .map((b) => b.toString(16).padStart(2, '0'))
    .join('');
}

function randomSalt() {
  const arr = crypto.getRandomValues(new Uint8Array(16));
  return Array.from(arr).map((b) => b.toString(16).padStart(2, '0')).join('');
}

const Auth = {
  currentUser: null,

  async createUser(username, password) {
    username = username.trim();
    if (!username || !password) throw new Error('Please fill in both fields.');
    const users = await DB.getAll('users');
    if (users.some((u) => u.username.toLowerCase() === username.toLowerCase())) {
      throw new Error('That username is already taken.');
    }
    const salt = randomSalt();
    const passwordHash = await sha256Hex(salt + password);
    const user = {
      id: uid('user'),
      username,
      passwordHash,
      salt,
      createdAt: Date.now(),
      settings: { defaultCurrency: 'USD', theme: 'light' },
    };
    await DB.put('users', user);
    await seedDefaultsForUser(user.id);
    return user;
  },

  async login(username, password) {
    const users = await DB.getAll('users');
    const user = users.find((u) => u.username.toLowerCase() === username.trim().toLowerCase());
    if (!user) throw new Error('No account with that username.');
    const hash = await sha256Hex(user.salt + password);
    if (hash !== user.passwordHash) throw new Error('Wrong password.');
    this.currentUser = user;
    localStorage.setItem(SESSION_KEY, JSON.stringify({ userId: user.id }));
    return user;
  },

  async restoreSession() {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    try {
      const { userId } = JSON.parse(raw);
      const user = await DB.get('users', userId);
      if (user) this.currentUser = user;
      return user;
    } catch (e) {
      return null;
    }
  },

  logout() {
    this.currentUser = null;
    localStorage.removeItem(SESSION_KEY);
  },

  async saveUser(user) {
    await DB.put('users', user);
    this.currentUser = user;
  },
};

/* Give every new user a starter set of groups and currencies so the app isn't empty. */
async function seedDefaultsForUser(userId) {
  const incomeGroups = [
    { name: 'Salary', icon: '💼', color: '#4C7A5A' },
    { name: 'Gift', icon: '🎁', color: '#3E7C74' },
    { name: 'Other Income', icon: '➕', color: '#767A3D' },
  ];
  const expenseGroups = [
    { name: 'Food', icon: '🍽️', color: '#8C3B4A' },
    { name: 'Transport', icon: '🚌', color: '#B5732E' },
    { name: 'Bills', icon: '🧾', color: '#4A5C82' },
    { name: 'Shopping', icon: '🛍️', color: '#A65A72' },
    { name: 'Health', icon: '💊', color: '#6B4C7A' },
    { name: 'Other', icon: '📦', color: '#C1633A' },
  ];
  for (const g of incomeGroups) {
    await DB.put('groups', { id: uid('grp'), userId, type: 'income', ...g });
  }
  for (const g of expenseGroups) {
    await DB.put('groups', { id: uid('grp'), userId, type: 'expense', ...g });
  }
  const currencies = [
    { code: 'USD', name: 'US Dollar', symbol: '$', rate: 1, isDefault: true },
    { code: 'EUR', name: 'Euro', symbol: '€', rate: 0.92 },
    { code: 'INR', name: 'Indian Rupee', symbol: '₹', rate: 83.3 },
  ];
  for (const c of currencies) {
    await DB.put('currencies', { id: uid('cur'), userId, ...c });
  }
}


/* currency.js — formatting & conversion helpers.
   Rates are stored as "units of this currency per 1 base unit" is NOT used;
   instead rate = value of 1 unit of this currency expressed in the user's base (default) currency's terms:
   we store rate = how many of this currency equal 1 default-currency unit (like a bank board rate).
   To convert an amount FROM currency A TO currency B: amount / rateA * rateB. */

const CurrencyUtil = {
  list: [], // currencies for current user
  defaultCode: 'USD',

  setAll(currencies) {
    this.list = currencies;
    const def = currencies.find((c) => c.isDefault);
    this.defaultCode = def ? def.code : (currencies[0] ? currencies[0].code : 'USD');
  },

  get(code) {
    return this.list.find((c) => c.code === code) || { code, symbol: code, rate: 1 };
  },

  symbol(code) {
    return this.get(code).symbol || code;
  },

  format(amount, code) {
    const c = this.get(code);
    const n = Number(amount || 0);
    const abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return `${n < 0 ? '-' : ''}${c.symbol}${abs}`;
  },

  // Convert amount from one currency to another using stored rates (rate = units per 1 default currency unit)
  convert(amount, fromCode, toCode) {
    if (fromCode === toCode) return Number(amount);
    const from = this.get(fromCode);
    const to = this.get(toCode);
    const fromRate = Number(from.rate) || 1;
    const toRate = Number(to.rate) || 1;
    const inDefault = Number(amount) / fromRate;
    return inDefault * toRate;
  },

  toDefault(amount, fromCode) {
    return this.convert(amount, fromCode, this.defaultCode);
  },
};


/* charts.js — thin wrappers around Chart.js for the dashboard & reports views. */

const ChartRegistry = {};

function destroyChart(key) {
  if (ChartRegistry[key]) {
    ChartRegistry[key].destroy();
    delete ChartRegistry[key];
  }
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function chartLibReady() {
  if (typeof Chart === 'undefined') {
    console.warn('Chart.js has not loaded (no internet on first load?). Charts will appear once it loads.');
    return false;
  }
  return true;
}

function renderIncomeExpenseBar(canvasId, labels, incomeData, expenseData) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Money In', data: incomeData, backgroundColor: cssVar('--accent'), borderRadius: 6, maxBarThickness: 26 },
        { label: 'Money Out', data: expenseData, backgroundColor: cssVar('--coral'), borderRadius: 6, maxBarThickness: 26 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: cssVar('--muted') } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
        y: { grid: { color: cssVar('--line') }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
      },
    },
  });
}

function renderGroupPie(canvasId, labels, data, colors) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (!data.length) return;
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: cssVar('--surface') }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10.5 }, color: cssVar('--muted') } } },
    },
  });
}

function renderTrendLine(canvasId, labels, data) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, 'rgba(15,157,120,0.35)');
  gradient.addColorStop(1, 'rgba(15,157,120,0)');
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total Money',
        data,
        borderColor: cssVar('--accent'),
        backgroundColor: gradient,
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: cssVar('--accent'),
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
        y: { grid: { color: cssVar('--line') }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
      },
    },
  });
}


/* app.js — main application controller */

const State = {
  user: null,
  view: 'home',
  transactions: [],
  groups: [],
  budgets: [],
  currencies: [],
  search: '',
  filters: { from: '', to: '', groupId: '', type: '' },
  editingTxId: null,
  pendingAttachments: [],
  theme: 'light',
};

const NAV_ITEMS = [
  { id: 'home', label: 'Home', ic: '🏠' },
  { id: 'income', label: 'Income', ic: '💰' },
  { id: 'expenses', label: 'Expenses', ic: '💸' },
  { id: 'reports', label: 'Reports', ic: '📊' },
  { id: 'budgets', label: 'Budgets', ic: '🎯' },
  { id: 'groups', label: 'Groups', ic: '🗂️' },
  { id: 'settings', label: 'Settings', ic: '⚙️' },
];

/* ---------------- Boot ---------------- */
window.addEventListener('DOMContentLoaded', boot);

async function boot() {
  await DB.init();
  await Auth.restoreSession();
  wireAuthScreen();
  if (Auth.currentUser) {
    await enterApp(Auth.currentUser);
  } else {
    showAuth();
  }
}

function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
}

async function enterApp(user) {
  State.user = user;
  State.theme = user.settings?.theme || 'light';
  applyTheme(State.theme);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  await loadUserData();
  buildSidebar();
  buildBottomNav();
  wireShell();
  goTo('home');
}

async function loadUserData() {
  const uidVal = State.user.id;
  [State.transactions, State.groups, State.budgets, State.currencies] = await Promise.all([
    DB.getAllByUser('transactions', uidVal),
    DB.getAllByUser('groups', uidVal),
    DB.getAllByUser('budgets', uidVal),
    DB.getAllByUser('currencies', uidVal),
  ]);
  CurrencyUtil.setAll(State.currencies);
}

/* ---------------- Auth screen wiring ---------------- */
function wireAuthScreen() {
  const tabs = document.querySelectorAll('.auth-tabs button');
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  tabs.forEach((tab) => {
    tab.addEventListener('click', () => {
      tabs.forEach((t) => t.classList.remove('active'));
      tab.classList.add('active');
      const isLogin = tab.dataset.tab === 'login';
      loginForm.classList.toggle('hidden', !isLogin);
      signupForm.classList.toggle('hidden', isLogin);
      document.getElementById('auth-error').textContent = '';
    });
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    try {
      const user = await Auth.login(username, password);
      loginForm.reset();
      await enterApp(user);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('signup-username').value;
    const password = document.getElementById('signup-password').value;
    const password2 = document.getElementById('signup-password2').value;
    if (password !== password2) {
      document.getElementById('auth-error').textContent = 'Passwords do not match.';
      return;
    }
    try {
      const user = await Auth.createUser(username, password);
      await Auth.login(username, password);
      signupForm.reset();
      await enterApp(user);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    }
  });
}

/* ---------------- Sidebar & bottom nav ---------------- */
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(
    (item) => `<button class="nav-item" data-nav="${item.id}"><span class="ic">${item.ic}</span>${item.label}</button>`
  ).join('');
  nav.querySelectorAll('.nav-item').forEach((btn) => btn.addEventListener('click', () => goTo(btn.dataset.nav)));

  const chip = document.getElementById('sidebar-user-chip');
  chip.querySelector('.name').textContent = State.user.username;
  chip.querySelector('.av').textContent = State.user.username.slice(0, 1).toUpperCase();
}

function buildBottomNav() {
  const bn = document.getElementById('bottom-nav');
  const items = NAV_ITEMS.filter((n) => ['home', 'income', 'expenses', 'reports', 'settings'].includes(n.id));
  bn.innerHTML = items.map(
    (item) => `<button data-nav="${item.id}"><span class="ic">${item.ic}</span>${item.label}</button>`
  ).join('');
  bn.querySelectorAll('button').forEach((btn) => btn.addEventListener('click', () => goTo(btn.dataset.nav)));
}

function wireShell() {
  document.getElementById('btn-logout').addEventListener('click', () => {
    Auth.logout();
    location.reload();
  });
  document.getElementById('fab-add').addEventListener('click', () => openTxModal());
  document.getElementById('btn-add-topbar').addEventListener('click', () => openTxModal());
  document.getElementById('global-search').addEventListener('input', (e) => {
    State.search = e.target.value.toLowerCase();
    if (['home', 'income', 'expenses'].includes(State.view)) renderView();
  });
  document.getElementById('theme-switch').addEventListener('click', toggleTheme);
  document.getElementById('theme-switch').classList.toggle('on', State.theme === 'dark');

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('modal-root').children.length) return;
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('global-search').focus();
    }
    if ((e.key === 'n' || e.key === 'N') && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      openTxModal();
    }
  });
}

function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  applyTheme(State.theme);
  document.getElementById('theme-switch').classList.toggle('on', State.theme === 'dark');
  State.user.settings.theme = State.theme;
  Auth.saveUser(State.user);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

/* ---------------- Routing ---------------- */
function goTo(view) {
  State.view = view;
  document.querySelectorAll('.nav-item').forEach((b) => b.classList.toggle('active', b.dataset.nav === view));
  document.querySelectorAll('#bottom-nav button').forEach((b) => b.classList.toggle('active', b.dataset.nav === view));
  document.getElementById('topbar-title').textContent = NAV_ITEMS.find((n) => n.id === view)?.label || '';
  renderView();
}

function renderView() {
  const root = document.getElementById('view-root');
  switch (State.view) {
    case 'home': root.innerHTML = renderHome(); afterRenderHome(); break;
    case 'income': root.innerHTML = renderTxList('income'); afterRenderTxList('income'); break;
    case 'expenses': root.innerHTML = renderTxList('expense'); afterRenderTxList('expense'); break;
    case 'reports': root.innerHTML = renderReports(); afterRenderReports(); break;
    case 'budgets': root.innerHTML = renderBudgets(); afterRenderBudgets(); break;
    case 'groups': root.innerHTML = renderGroups(); afterRenderGroups(); break;
    case 'settings': root.innerHTML = renderSettings(); afterRenderSettings(); break;
  }
}

/* ---------------- Helpers ---------------- */
function fmt(amount, code) { return CurrencyUtil.format(amount, code); }
function toDefault(amount, code) { return CurrencyUtil.toDefault(amount, code); }
function groupById(id) { return State.groups.find((g) => g.id === id); }
function monthKey(date) { const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; }
function monthLabel(key) { const [y, m] = key.split('-'); return new Date(y, m - 1).toLocaleString(undefined, { month: 'short', year: '2-digit' }); }

function totalsInDefault(txs) {
  let income = 0, expense = 0;
  txs.forEach((t) => {
    const v = toDefault(t.amount, t.currency);
    if (t.type === 'income') income += v; else expense += v;
  });
  return { income, expense, net: income - expense };
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

      </div>
      <div class="stat-card card">
        <div class="top"><div class="ic" style="background:var(--gold-soft); color:var(--gold);">🎯</div></div>

      <div class="list-head"><h3>Recent Activity</h3><button class="btn btn-ghost btn-sm" id="see-all-tx">See All</button></div>
      ${recent.length ? recent.map(txRowHtml).join('') : emptyState('📭', 'No transactions yet', 'Tap the + button to add your first one.')}
    </div>
  `;
}

/* The jar is the hero's signature element: a literal coin jar that fills up
   by how much of this month's money has stayed saved, instead of a generic
   ring gauge. Interior body spans y=24..122 (98px tall) inside the outline. */
function jarSvg(pct) {
  const top = 24, bodyH = 98;
  const liquidH = Math.max(0, (pct / 100) * bodyH);
  const liquidY = top + (bodyH - liquidH);
  return `
    <div class="jar-wrap">
      <svg class="jar-svg" viewBox="0 0 104 132" width="88" height="112">
        <rect x="35" y="2" width="34" height="12" rx="4" class="jar-lid"></rect>
        <rect x="39" y="12" width="26" height="10" class="jar-lid" opacity="0.7"></rect>
        <clipPath id="jarClip"><rect x="19" y="24" width="66" height="98" rx="18"></rect></clipPath>
        <g clip-path="url(#jarClip)">
          <rect x="19" y="${liquidY.toFixed(1)}" width="66" height="${(liquidH + 6).toFixed(1)}" class="jar-liquid"></rect>
          <rect x="19" y="${liquidY.toFixed(1)}" width="66" height="3" class="jar-wave"></rect>
        </g>
        <rect x="17" y="22" width="70" height="102" rx="20" class="jar-outline"></rect>
      </svg>
      <div class="jar-caption"><strong>${pct}%</strong>kept this month</div>
    </div>
  `;
}

function afterRenderHome() {
  document.getElementById('see-all-tx')?.addEventListener('click', () => goTo('expenses'));
  wireTxRowButtons();

  // Bar: last 6 months income vs expense
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(monthKey(d));
  }
  const incomeData = months.map((mk) => totalsInDefault(State.transactions.filter((t) => t.type === 'income' && monthKey(t.date) === mk)).income);
  const expenseData = months.map((mk) => totalsInDefault(State.transactions.filter((t) => t.type === 'expense' && monthKey(t.date) === mk)).expense);
  renderIncomeExpenseBar('chart-bar', months.map(monthLabel), incomeData, expenseData);

  // Pie: spending by group (expenses only)
  const expenseGroups = State.groups.filter((g) => g.type === 'expense');
  const pieLabels = [], pieData = [], pieColors = [];
  expenseGroups.forEach((g) => {
    const sum = totalsInDefault(State.transactions.filter((t) => t.type === 'expense' && t.groupId === g.id)).expense;
    if (sum > 0) { pieLabels.push(g.name); pieData.push(Number(sum.toFixed(2))); pieColors.push(g.color); }
  });
  renderGroupPie('chart-pie', pieLabels, pieData, pieColors);

  // Line: running total over last 6 months
  let running = 0;
  const beforeStart = State.transactions.filter((t) => new Date(t.date) < new Date(now.getFullYear(), now.getMonth() - 5, 1));
  running = totalsInDefault(beforeStart).net;
  const lineData = months.map((mk) => {
    const t = totalsInDefault(State.transactions.filter((tr) => monthKey(tr.date) === mk));
    running += t.net;
    return Number(running.toFixed(2));
  });
  renderTrendLine('chart-line', months.map(monthLabel), lineData);
}

function emptyState(icon, title, sub) {
  return `<div class="empty-state"><div class="big">${icon}</div><p><strong>${title}</strong><br>${sub}</p></div>`;
}

/* ================= Transaction row + list ================= */
function txRowHtml(t) {
  const g = groupById(t.groupId);
  const sign = t.type === 'income' ? '+' : '-';
  const cls = t.type === 'income' ? 'pos' : 'neg';
  return `
    <div class="tx-row" data-id="${t.id}">
      <div class="ic" style="background:${g ? g.color + '22' : '#ddd'}; color:${g ? g.color : '#666'};">${g ? g.icon : '❓'}</div>
      <div class="info">
        <div class="desc">${escapeHtml(t.description || (g ? g.name : 'Transaction'))}</div>
        <div class="meta">${g ? g.name : 'No Group'} · ${new Date(t.date).toLocaleDateString()}${t.attachments?.length ? ` <span class="attach-badge">📎 ${t.attachments.length}</span>` : ''}</div>
      </div>
      <div class="amt mono ${cls}">${sign}${fmt(t.amount, t.currency)}</div>
      <div class="row-actions">
        <button class="btn btn-icon btn-ghost btn-edit-tx" title="Edit">✏️</button>

}

function wireTxRowButtons() {
  document.querySelectorAll('.btn-edit-tx').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.tx-row').dataset.id;
      openTxModal(State.transactions.find((t) => t.id === id));
    });
  });
  document.querySelectorAll('.btn-del-tx').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      const id = e.target.closest('.tx-row').dataset.id;
      if (!confirm('Delete this transaction? This cannot be undone.')) return;
      await DB.delete('transactions', id);

function renderTxList(type) {
  const label = type === 'income' ? 'Income' : 'Expenses';
  const groupsOfType = State.groups.filter((g) => g.type === type);
  let list = State.transactions.filter((t) => t.type === type);

  if (State.filters.from) list = list.filter((t) => t.date >= State.filters.from);
  if (State.filters.to) list = list.filter((t) => t.date <= State.filters.to);
  if (State.filters.groupId) list = list.filter((t) => t.groupId === State.filters.groupId);
  if (State.search) list = list.filter((t) => (t.description || '').toLowerCase().includes(State.search) || (groupById(t.groupId)?.name || '').toLowerCase().includes(State.search));

  list.sort((a, b) => new Date(b.date) - new Date(a.date));
  const total = totalsInDefault(list)[type === 'income' ? 'income' : 'expense'];

  return `
    <div class="filter-bar card" style="padding:14px 16px;">
      <div class="field"><label>From</label><input type="date" id="filter-from" value="${State.filters.from}"></div>
      <div class="field"><label>To</label><input type="date" id="filter-to" value="${State.filters.to}"></div>
      <div class="field">
        <label>Group</label>
        <select id="filter-group">
          <option value="">All Groups</option>
          ${groupsOfType.map((g) => `<option value="${g.id}" ${State.filters.groupId === g.id ? 'selected' : ''}>${g.icon} ${g.name}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" id="clear-filters">Clear</button>
      <button class="btn btn-primary btn-sm" id="export-csv" style="margin-left:auto;">Export</button>
    </div>
    <div class="list-card card">
      <div class="list-head">
        <h3>${label} List</h3>
        <span class="pill ${type === 'income' ? 'pill-income' : 'pill-expense'}">Total: ${fmt(total, CurrencyUtil.defaultCode)}</span>
      </div>
      ${list.length ? list.map(txRowHtml).join('') : emptyState(type === 'income' ? '💰' : '💸', `No ${label.toLowerCase()} found`, 'Try changing filters or add a new one.')}
    </div>
  `;
}

function afterRenderTxList(type) {
  wireTxRowButtons();
  document.getElementById('filter-from').addEventListener('change', (e) => { State.filters.from = e.target.value; renderView(); });
  document.getElementById('filter-to').addEventListener('change', (e) => { State.filters.to = e.target.value; renderView(); });
  document.getElementById('filter-group').addEventListener('change', (e) => { State.filters.groupId = e.target.value; renderView(); });
  document.getElementById('clear-filters').addEventListener('click', () => { State.filters = { from: '', to: '', groupId: '', type: '' }; renderView(); });
  document.getElementById('export-csv').addEventListener('click', () => exportCsv(type));
}

function exportCsv(type) {
  const list = State.transactions.filter((t) => t.type === type);
  const rows = [['Date', 'Description', 'Group', 'Amount', 'Currency']];
  list.forEach((t) => rows.push([t.date, t.description || '', groupById(t.groupId)?.name || '', t.amount, t.currency]));
  const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${type}-export.csv`;
  a.click();
  showToast('File exported');
}

  const currencySel = document.getElementById('rep-currency');
  currencySel.value = CurrencyUtil.defaultCode;
  const rerun = () => renderReportCharts(document.getElementById('rep-from').value, document.getElementById('rep-to').value, currencySel.value);
  document.getElementById('rep-from').addEventListener('change', rerun);
  document.getElementById('rep-to').addEventListener('change', rerun);
  currencySel.addEventListener('change', rerun);
  rerun();
}

function renderReportCharts(from, to, toCode) {
  let list = State.transactions;
  if (from) list = list.filter((t) => t.date >= from);
  if (to) list = list.filter((t) => t.date <= to);

  const months = [...new Set(list.map((t) => monthKey(t.date)))].sort();
  const finalMonths = months.length ? months : [monthKey(new Date())];
  const incomeData = finalMonths.map((mk) => list.filter((t) => t.type === 'income' && monthKey(t.date) === mk).reduce((s, t) => s + CurrencyUtil.convert(t.amount, t.currency, toCode), 0));
  const expenseData = finalMonths.map((mk) => list.filter((t) => t.type === 'expense' && monthKey(t.date) === mk).reduce((s, t) => s + CurrencyUtil.convert(t.amount, t.currency, toCode), 0));
  renderIncomeExpenseBar('rep-bar', finalMonths.map(monthLabel), incomeData, expenseData);

  const expenseGroups = State.groups.filter((g) => g.type === 'expense');
  const pieLabels = [], pieData = [], pieColors = [];
  expenseGroups.forEach((g) => {
    const sum = list.filter((t) => t.type === 'expense' && t.groupId === g.id).reduce((s, t) => s + CurrencyUtil.convert(t.amount, t.currency, toCode), 0);
    if (sum > 0) { pieLabels.push(g.name); pieData.push(Number(sum.toFixed(2))); pieColors.push(g.color); }
  });
  renderGroupPie('rep-pie', pieLabels, pieData, pieColors);

  let running = 0;
  const lineData = finalMonths.map((mk, i) => {
    running += incomeData[i] - expenseData[i];
    return Number(running.toFixed(2));
  });
  renderTrendLine('rep-line', finalMonths.map(monthLabel), lineData);
}

/* ================= BUDGETS ================= */
function renderBudgets() {
  const expenseGroups = State.groups.filter((g) => g.type === 'expense');
  const thisMonthKey = monthKey(new Date());
  const rows = expenseGroups.map((g) => {
    const budget = State.budgets.find((b) => b.groupId === g.id);
    const spent = totalsInDefault(State.transactions.filter((t) => t.type === 'expense' && t.groupId === g.id && monthKey(t.date) === thisMonthKey)).expense;
    const limit = budget ? toDefault(budget.amount, budget.currency) : 0;
    const pct = limit > 0 ? Math.min(100, Math.round((spent / limit) * 100)) : 0;
    return `
      <div class="budget-row" data-group="${g.id}">
        <div class="top"><span>${g.icon} ${g.name}</span><span>${fmt(spent, CurrencyUtil.defaultCode)} ${limit ? '/ ' + fmt(limit, CurrencyUtil.defaultCode) : ''}</span></div>
        <div class="bar"><div class="fill ${pct >= 100 ? 'over' : ''}" style="width:${limit ? pct : 0}%; background:${limit ? '' : 'var(--line)'};"></div></div>
        <div class="sub">${limit ? pct + '% used this month' : 'No limit set'} · <a href="#" class="set-budget-link" data-group="${g.id}">${limit ? 'Edit Limit' : 'Set Limit'}</a></div>
      </div>`;
  }).join('');
  return `<div class="list-card card"><div class="list-head"><h3>Group Limits (This Month)</h3></div>${rows || emptyState('🎯', 'No groups yet', 'Add a group first.')}</div>`;
}

function afterRenderBudgets() {

}

function openBudgetModal(groupId) {
  const g = groupById(groupId);
  const existing = State.budgets.find((b) => b.groupId === groupId);
  const currencyOptions = State.currencies.map((c) => `<option value="${c.code}" ${existing?.currency === c.code ? 'selected' : (!existing && c.isDefault ? 'selected' : '')}>${c.code}</option>`).join('');
  openModal(`
    <h3>${g.icon} Set Limit — ${g.name}</h3>
    <div class="form-grid">
      <div class="two-col">
        <div class="field"><label>Amount</label><input type="number" id="budget-amount" min="0" step="0.01" value="${existing ? existing.amount : ''}" placeholder="0.00"></div>
        <div class="field"><label>Currency</label><select id="budget-currency">${currencyOptions}</select></div>
      </div>
    </div>
    <div class="modal-actions">
      ${existing ? '<button class="btn btn-danger" id="budget-remove">Remove Limit</button>' : ''}
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="budget-save">Save</button>
    </div>
  `);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('budget-remove')?.addEventListener('click', async () => {

    const record = existing ? { ...existing, amount, currency } : { id: uid('bud'), userId: State.user.id, groupId, amount, currency };
    await DB.put('budgets', record);
    State.budgets = State.budgets.filter((b) => b.id !== record.id).concat(record);
    closeModal(); renderView(); showToast('Limit saved');
  });
}

/* ================= GROUPS ================= */

        <div class="name">${escapeHtml(g.name)}</div>
        <div class="spend mono">${fmt(spend, CurrencyUtil.defaultCode)} total</div>
      </div>`;

  return `
    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;"><button class="btn btn-primary" id="add-group-btn">+ Add Group</button></div>

const GROUP_ICONS = ['💼','🎁','➕','🍽️','🚌','🧾','🛍️','💊','📦','🏠','🎓','🎮','✈️','🐾','💇','📱','🧘','🚗','🍕','☕'];
const GROUP_COLORS = ['#4C7A5A','#8C3B4A','#D6A23C','#3E7C74','#B5732E','#6B4C7A','#C1633A','#4A5C82','#767A3D','#A65A72'];

function afterRenderGroups() {

  document.querySelectorAll('.edit-group').forEach((btn) => btn.addEventListener('click', (e) => {
    const id = e.target.closest('.group-tile').dataset.id;
    openGroupModal(groupById(id));
  }));
  document.querySelectorAll('.del-group').forEach((btn) => btn.addEventListener('click', async (e) => {

}

function openGroupModal(existing) {
  const iconPicker = GROUP_ICONS.map((ic) => `<button type="button" class="icon-opt btn btn-icon ${existing?.icon === ic ? 'active-pick' : ''}" data-ic="${ic}" style="font-size:16px;">${ic}</button>`).join('');
  const colorPicker = GROUP_COLORS.map((c) => `<button type="button" class="color-opt" data-color="${c}" style="width:26px;height:26px;border-radius:50%;background:${c};border:2px solid ${existing?.color === c ? 'var(--ink)' : 'transparent'};cursor:pointer;"></button>`).join('');
  openModal(`
    <h3>${existing ? 'Edit Group' : 'Add Group'}</h3>
    <div class="form-grid">
      <div class="field"><label>Name</label><input type="text" id="group-name" value="${existing ? escapeHtml(existing.name) : ''}" placeholder="e.g. Groceries"></div>
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button type="button" id="g-type-income" class="${(!existing || existing.type==='income') ? 'active-income' : ''}">Income</button>
          <button type="button" id="g-type-expense" class="${existing?.type==='expense' ? 'active-expense' : ''}">Expense</button>
        </div>
      </div>
      <div class="field"><label>Icon</label><div style="display:flex; flex-wrap:wrap; gap:6px;">${iconPicker}</div></div>
      <div class="field"><label>Color</label><div style="display:flex; flex-wrap:wrap; gap:8px;">${colorPicker}</div></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="group-save">Save</button>
    </div>
  `);
  let picked = { type: existing?.type || 'income', icon: existing?.icon || GROUP_ICONS[0], color: existing?.color || GROUP_COLORS[0] };
  document.getElementById('g-type-income').addEventListener('click', () => { picked.type='income'; document.getElementById('g-type-income').className='active-income'; document.getElementById('g-type-expense').className=''; });
  document.getElementById('g-type-expense').addEventListener('click', () => { picked.type='expense'; document.getElementById('g-type-expense').className='active-expense'; document.getElementById('g-type-income').className=''; });
  document.querySelectorAll('.icon-opt').forEach((b) => b.addEventListener('click', () => { picked.icon = b.dataset.ic; document.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('active-pick')); b.classList.add('active-pick'); }));
  document.querySelectorAll('.color-opt').forEach((b) => b.addEventListener('click', () => { picked.color = b.dataset.color; document.querySelectorAll('.color-opt').forEach(x=>x.style.border='2px solid transparent'); b.style.border='2px solid var(--ink)'; }));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('group-save').addEventListener('click', async () => {
    const name = document.getElementById('group-name').value.trim();
    if (!name) { showToast('Please enter a name'); return; }
    const record = existing ? { ...existing, name, ...picked } : { id: uid('grp'), userId: State.user.id, name, ...picked };
    await DB.put('groups', record);
    State.groups = State.groups.filter((g) => g.id !== record.id).concat(record);
    closeModal(); renderView(); showToast('Group saved');
  });
}

    row.querySelector('.cur-default').addEventListener('change', async () => {
      for (const c of State.currencies) {
        c.isDefault = c.id === id;
        if (c.isDefault) c.rate = 1;
        await DB.put('currencies', c);
      }
      CurrencyUtil.setAll(State.currencies);
      renderView(); showToast('Default money type updated');
    });
    row.querySelector('.cur-del').addEventListener('click', async () => {
      const used = State.transactions.some((t) => t.currency === State.currencies.find(c=>c.id===id).code);
      if (used && !confirm('Transactions use this money type. Delete anyway?')) return;
      await DB.delete('currencies', id);
      State.currencies = State.currencies.filter((c) => c.id !== id);
      CurrencyUtil.setAll(State.currencies);
      renderView(); showToast('Money type removed');
    });
  });
}

function openCurrencyModal() {
  openModal(`
    <h3>Add Money Type</h3>
    <div class="form-grid">
      <div class="two-col">
        <div class="field"><label>Code</label><input type="text" id="cur-code" maxlength="6" placeholder="e.g. GBP" style="text-transform:uppercase;"></div>
        <div class="field"><label>Symbol</label><input type="text" id="cur-symbol" maxlength="3" placeholder="£"></div>
      </div>
      <div class="field"><label>Name</label><input type="text" id="cur-name" placeholder="e.g. British Pound"></div>
      <div class="field"><label>Rate (units per 1 default)</label><input type="number" id="cur-rate" step="0.0001" value="1"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="cur-save">Save</button>
    </div>
  `);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('cur-save').addEventListener('click', async () => {
    const code = document.getElementById('cur-code').value.trim().toUpperCase();
    const symbol = document.getElementById('cur-symbol').value.trim() || code;
    const name = document.getElementById('cur-name').value.trim();
    const rate = parseFloat(document.getElementById('cur-rate').value) || 1;
    if (!code || !name) { showToast('Please fill in code and name'); return; }
    if (State.currencies.some((c) => c.code === code)) { showToast('That code already exists'); return; }
    const record = { id: uid('cur'), userId: State.user.id, code, symbol, name, rate, isDefault: State.currencies.length === 0 };
    await DB.put('currencies', record);
    State.currencies.push(record);
    CurrencyUtil.setAll(State.currencies);
    closeModal(); renderView(); showToast('Money type added');
  });
}

function openChangePasswordModal() {
  openModal(`
    <h3>Change Password</h3>
    <div class="form-grid">
      <div class="field"><label>Current Password</label><input type="password" id="cp-current"></div>
      <div class="field"><label>New Password</label><input type="password" id="cp-new"></div>
      <div class="field"><label>Confirm New Password</label><input type="password" id="cp-confirm"></div>
    </div>
    <div class="auth-error" id="cp-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="cp-save">Save</button>
    </div>
  `);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('cp-save').addEventListener('click', async () => {
    const current = document.getElementById('cp-current').value;
    const next = document.getElementById('cp-new').value;
    const confirmVal = document.getElementById('cp-confirm').value;
    const hash = await sha256Hex(State.user.salt + current);
    if (hash !== State.user.passwordHash) { document.getElementById('cp-error').textContent = 'Current password is wrong.'; return; }
    if (!next || next !== confirmVal) { document.getElementById('cp-error').textContent = 'New passwords do not match.'; return; }
    State.user.passwordHash = await sha256Hex(State.user.salt + next);
    await Auth.saveUser(State.user);
    closeModal(); showToast('Password changed');
  });
}

/* ================= Transaction Modal ================= */
function openTxModal(existing) {
  State.editingTxId = existing ? existing.id : null;
  State.pendingAttachments = existing ? [...(existing.attachments || [])] : [];
  const type = existing ? existing.type : 'expense';
  renderTxModalBody(type, existing);
}

function renderTxModalBody(type, existing) {
  const groupsOfType = State.groups.filter((g) => g.type === type);
  const currencyOptions = State.currencies.map((c) => `<option value="${c.code}" ${((existing?.currency)||CurrencyUtil.defaultCode) === c.code ? 'selected' : ''}>${c.code}</option>`).join('');
  const dateVal = existing ? existing.date : new Date().toISOString().slice(0, 10);

  openModal(`
    <h3>${existing ? 'Edit Transaction' : 'Add Transaction'}</h3>
    <div class="type-toggle" style="margin-bottom:16px;">
      <button type="button" id="tx-type-income" class="${type === 'income' ? 'active-income' : ''}">Income</button>
      <button type="button" id="tx-type-expense" class="${type === 'expense' ? 'active-expense' : ''}">Expense</button>
    </div>
    <div class="form-grid">
      <div class="two-col">
        <div class="field"><label>Amount</label><input type="number" id="tx-amount" min="0" step="0.01" value="${existing ? existing.amount : ''}" placeholder="0.00"></div>
        <div class="field"><label>Money Type</label><select id="tx-currency">${currencyOptions}</select></div>
      </div>
      <div class="field"><label>What was it for</label><input type="text" id="tx-desc" value="${existing ? escapeHtml(existing.description || '') : ''}" placeholder="e.g. Coffee with friend"></div>
      <div class="two-col">
        <div class="field"><label>Group</label><select id="tx-group">${groupsOfType.map((g) => `<option value="${g.id}" ${existing?.groupId === g.id ? 'selected' : ''}>${g.icon} ${g.name}</option>`).join('')}</select></div>
        <div class="field"><label>Date</label><input type="date" id="tx-date" value="${dateVal}"></div>
      </div>
      <div class="field">
        <label>Attachments (bill, receipt, image, PDF)</label>
        <div class="attach-drop" id="attach-drop">Tap to add a file</div>
        <input type="file" id="tx-file" class="hidden" multiple accept="image/*,application/pdf">
        <div class="attach-list" id="attach-list"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="tx-save">Save</button>
    </div>
  `);

  let currentType = type;
  const switchType = (t) => {
    currentType = t;
    document.getElementById('tx-type-income').className = t === 'income' ? 'active-income' : '';
    document.getElementById('tx-type-expense').className = t === 'expense' ? 'active-expense' : '';
    const groupSel = document.getElementById('tx-group');
    const groups = State.groups.filter((g) => g.type === t);
    groupSel.innerHTML = groups.map((g) => `<option value="${g.id}">${g.icon} ${g.name}</option>`).join('');
  };
  document.getElementById('tx-type-income').addEventListener('click', () => switchType('income'));
  document.getElementById('tx-type-expense').addEventListener('click', () => switchType('expense'));

  renderAttachList();
  document.getElementById('attach-drop').addEventListener('click', () => document.getElementById('tx-file').click());
  document.getElementById('tx-file').addEventListener('change', async (e) => {
    for (const file of e.target.files) {
      if (file.size > 4 * 1024 * 1024) { showToast(`${file.name} is too big (max 4MB)`); continue; }
      const dataUrl = await fileToDataUrl(file);
      State.pendingAttachments.push({ name: file.name, type: file.type, dataUrl });
    }
    renderAttachList();
    e.target.value = '';
  });

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('tx-save').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('tx-amount').value);
    const currency = document.getElementById('tx-currency').value;
    const description = document.getElementById('tx-desc').value.trim();
    const groupId = document.getElementById('tx-group').value;
    const date = document.getElementById('tx-date').value;
    if (!amount || amount <= 0) { showToast('Please enter an amount'); return; }
    if (!groupId) { showToast('Please choose a group'); return; }
    if (!date) { showToast('Please choose a date'); return; }

    const record = {
      id: State.editingTxId || uid('tx'),
      userId: State.user.id,
      type: currentType,
      amount, currency, description, groupId, date,
      attachments: State.pendingAttachments,
      createdAt: existing ? existing.createdAt : Date.now(),
    };
    await DB.put('transactions', record);
    State.transactions = State.transactions.filter((t) => t.id !== record.id).concat(record);
    closeModal();
    renderView();
    showToast(State.editingTxId ? 'Transaction updated' : 'Transaction added');
  });
}

function renderAttachList() {
  const box = document.getElementById('attach-list');
  if (!box) return;
  box.innerHTML = State.pendingAttachments.map((a, i) => `
    <div class="attach-chip">${a.type.includes('pdf') ? '📄' : '🖼️'} ${escapeHtml(a.name.slice(0, 18))} <button data-i="${i}" class="rm-attach">✕</button></div>
  `).join('');
  box.querySelectorAll('.rm-attach').forEach((btn) => btn.addEventListener('click', () => {
    State.pendingAttachments.splice(Number(btn.dataset.i), 1);
    renderAttachList();
  }));
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================= Generic Modal ================= */
function openModal(innerHtml) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal card">${innerHtml}</div></div>`;
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  State.editingTxId = null;
  State.pendingAttachments = [];
}

</script>
