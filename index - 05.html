<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money — Your Simple Finance Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============ Design tokens — "Money Jar" theme ============
   A tactile, ledger-and-coin-jar identity for everyday people, not a
   generic fintech dashboard: warm stone paper, moss-green growth,
   wine-red spending, honey-gold highlights. Fraunces (soft serif) for
   big numbers, Space Grotesk for UI text, Space Mono for tabular figures. */
:root{
  --bg: #EEF0E6;
  --surface: #FBFAF3;
  --surface-glass: rgba(251,250,243,0.72);
  --ink: #202B22;
  --muted: #6C7566;
  --line: #DBDACB;
  --accent: #4C7A5A;
  --accent-ink: #223A2A;
  --accent-soft: #DEE9DD;
  --coral: #8C3B4A;
  --coral-soft: #F3DFDF;
  --gold: #D6A23C;
  --gold-soft: #F6E7C8;
  --info: #3E7C74;
  --info-soft: #DCEBE7;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 10px 28px rgba(32,43,34,0.08), 0 3px 8px rgba(32,43,34,0.05);
  --shadow-lift: 0 18px 44px rgba(32,43,34,0.16);
  --dur: 220ms;
  --ease: cubic-bezier(.4,0,.2,1);
  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body: 'Space Grotesk', 'Segoe UI', sans-serif;
  --font-mono: 'Space Mono', ui-monospace, monospace;
}

[data-theme="dark"]{
  --bg: #141B15;
  --surface: #1C251D;
  --surface-glass: rgba(28,37,29,0.72);
  --ink: #EAF0E6;
  --muted: #96A38F;
  --line: #2C372C;
  --accent: #74AE87;
  --accent-ink: #E7F4EA;
  --accent-soft: #223B2B;
  --coral: #D98A93;
  --coral-soft: #3B2224;
  --gold: #E8BE6E;
  --gold-soft: #3A2F17;
  --info: #7FBDB2;
  --info-soft: #1F3833;
  --shadow: 0 10px 28px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.25);
  --shadow-lift: 0 18px 44px rgba(0,0,0,0.45);
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
h1,h2,h3,h4{ font-family:var(--font-display); margin:0; letter-spacing:-0.01em; }
button, input, select{ font-family:inherit; }
.mono{ font-family:var(--font-mono); font-variant-numeric: tabular-nums; }
a{ color:inherit; }
::selection{ background:var(--accent); color:#fff; }

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

/* ============ Utility ============ */
.hidden{ display:none !important; }
.btn{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 18px; border-radius:999px; border:none;
  font-size:14px; font-weight:600; cursor:pointer;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
  background:var(--surface); color:var(--ink); border:1px solid var(--line);
}
.btn:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }
.btn:active{ transform:translateY(0); }
.btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.btn-primary{ background:var(--accent); color:#fff; border:none; }
.btn-primary:hover{ box-shadow:0 10px 24px rgba(76,122,90,0.35); }
.btn-danger{ background:var(--coral-soft); color:var(--coral); border:none; }
.btn-ghost{ background:transparent; border:1px solid transparent; }
.btn-ghost:hover{ background:var(--surface); box-shadow:none; }
.btn-sm{ padding:6px 12px; font-size:13px; }
.btn-icon{ width:38px; height:38px; padding:0; border-radius:12px; justify-content:center; }

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.field{ display:flex; flex-direction:column; gap:6px; }
.field label{ font-size:13px; font-weight:600; color:var(--muted); }
.field input, .field select, .field textarea{
  padding:11px 14px; border-radius:var(--radius-sm); border:1px solid var(--line);
  background:var(--bg); color:var(--ink); font-size:14px;
  transition: border-color var(--dur) var(--ease);
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:none; border-color:var(--accent);
}
.pill{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.pill-income{ background:var(--accent-soft); color:var(--accent-ink); }
.pill-expense{ background:var(--coral-soft); color:var(--coral); }

/* ============ Auth screen ============ */
#auth-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background:
    radial-gradient(circle at 15% 15%, var(--accent-soft), transparent 45%),
    radial-gradient(circle at 85% 85%, var(--coral-soft), transparent 45%),
    var(--bg);
}
.auth-box{ width:100%; max-width:400px; padding:36px 32px; text-align:center; }
.auth-logo{
  width:58px; height:58px; border-radius:18px; margin:0 auto 18px;
  background:linear-gradient(135deg, var(--accent-ink), var(--accent));
  display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff;
  box-shadow:0 10px 24px rgba(76,122,90,0.35);
}
.auth-box h1{ font-size:22px; margin-bottom:4px; }
.auth-box p.sub{ color:var(--muted); font-size:14px; margin-bottom:24px; }
.auth-tabs{ display:flex; background:var(--bg); border-radius:999px; padding:4px; margin-bottom:22px; }
.auth-tabs button{
  flex:1; border:none; background:transparent; padding:9px; border-radius:999px; font-weight:700;
  font-size:13px; color:var(--muted); cursor:pointer; transition:all var(--dur) var(--ease);
}
.auth-tabs button.active{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
.auth-form{ display:flex; flex-direction:column; gap:14px; text-align:left; }
.auth-error{ color:var(--coral); font-size:13px; min-height:16px; text-align:left; }
.auth-box .btn-primary{ width:100%; justify-content:center; padding:12px; margin-top:4px; }

/* ============ App shell ============ */
#app-shell{ display:flex; min-height:100vh; }

.sidebar{
  width:230px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--line);
  display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh;
}
.sidebar-logo{ display:flex; align-items:center; gap:10px; padding:6px 10px 22px; }
.sidebar-logo .mark{ width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg, var(--accent-ink), var(--accent)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-family:var(--font-display); }
.sidebar-logo span{ font-family:var(--font-display); font-weight:800; font-size:16px; }
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px;
  color:var(--muted); font-weight:600; font-size:14px; cursor:pointer; margin-bottom:2px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  border:none; background:transparent; width:100%; text-align:left;
}
.nav-item:hover{ background:var(--bg); color:var(--ink); }
.nav-item.active{ background:var(--accent-soft); color:var(--accent-ink); }
.nav-item .ic{ font-size:17px; width:20px; text-align:center; }
.sidebar-footer{ margin-top:auto; display:flex; flex-direction:column; gap:6px; }
.user-chip{ display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px; background:var(--bg); }
.user-chip .av{ width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.user-chip .name{ font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.main-area{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; gap:14px; padding:18px 28px; position:sticky; top:0;
  background:var(--surface-glass); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); z-index:5;
}
.topbar h2{ font-size:20px; flex-shrink:0; }
.search-box{ flex:1; max-width:360px; position:relative; }
.search-box input{ width:100%; padding:9px 14px 9px 36px; border-radius:999px; border:1px solid var(--line); background:var(--bg); color:var(--ink); font-size:13px; }
.search-box input:focus{ outline:none; border-color:var(--accent); }
.search-box .ic{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5; font-size:13px; }
.topbar-actions{ margin-left:auto; display:flex; align-items:center; gap:10px; }

.view{ padding:24px 28px 100px; animation: fadein var(--dur) var(--ease); }
@keyframes fadein{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }

/* ============ Dashboard ============ */
.hero-money{
  padding:26px 30px; display:flex; align-items:center; justify-content:space-between; gap:24px;
  background:linear-gradient(135deg, var(--accent-ink) 0%, var(--accent) 100%);
  color:#fff; margin-bottom:20px; position:relative; overflow:hidden;
}
.hero-money::after{
  content:''; position:absolute; right:-70px; top:-70px; width:240px; height:240px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
}
.hero-money .label{ font-size:12.5px; opacity:.8; font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-family:var(--font-body); }
.hero-money .amount{ font-size:40px; font-weight:600; font-family:var(--font-display); margin-top:4px; font-variant-numeric:tabular-nums; }

/* Signature element: a coin jar that fills up according to how much of your
   income you've kept this cycle — a literal, friendly stand-in for "savings". */
.jar-wrap{ position:relative; width:104px; height:128px; flex-shrink:0; z-index:1; }
.jar-svg .jar-outline{ fill:none; stroke:rgba(255,255,255,0.55); stroke-width:2.5; }
.jar-svg .jar-lid{ fill:rgba(255,255,255,0.28); }
.jar-svg .jar-liquid{ fill:var(--gold); transition:y 500ms var(--ease), height 500ms var(--ease); }
.jar-svg .jar-wave{ fill:rgba(255,255,255,0.55); }
.jar-caption{ text-align:center; margin-top:4px; font-size:11.5px; font-weight:600; opacity:.85; }
.jar-caption strong{ font-family:var(--font-display); font-size:14px; font-weight:600; display:block; }

.stat-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:16px; margin-bottom:20px; }
.stat-card{ padding:18px; }
.stat-card .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.stat-card .ic{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.stat-card .val{ font-size:22px; font-weight:800; font-family:var(--font-display); }
.stat-card .lbl{ font-size:12.5px; color:var(--muted); font-weight:600; }

.chart-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin-bottom:20px; }
.chart-card{ padding:18px; }
.chart-card h3{ font-size:14px; margin-bottom:12px; }
.chart-card canvas{ max-height:230px; }
@media (max-width: 900px){ .chart-grid{ grid-template-columns:1fr; } }

.list-card{ padding:6px 0; }
.list-card .list-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 18px; }
.list-card .list-head h3{ font-size:15px; }

.tx-row{ display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid var(--line); transition: background var(--dur); }
.tx-row:hover{ background:var(--bg); }
.tx-row .ic{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.tx-row .info{ flex:1; min-width:0; }
.tx-row .info .desc{ font-weight:700; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tx-row .info .meta{ font-size:12px; color:var(--muted); margin-top:2px; }
.tx-row .amt{ font-weight:800; font-size:14px; flex-shrink:0; }
.tx-row .amt.pos{ color:var(--accent); }
.tx-row .amt.neg{ color:var(--coral); }
.tx-row .row-actions{ display:flex; gap:4px; opacity:0; transition:opacity var(--dur); }
.tx-row:hover .row-actions{ opacity:1; }
.tx-row .attach-badge{ font-size:11px; color:var(--muted); margin-left:4px; }

.empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .big{ font-size:34px; margin-bottom:10px; }
.empty-state p{ font-size:13.5px; }

/* ============ Filter bar ============ */
.filter-bar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:end; }
.filter-bar .field{ min-width:150px; }

/* ============ Groups grid ============ */
.groups-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:14px; }
.group-tile{ padding:16px; display:flex; flex-direction:column; gap:8px; position:relative; }
.group-tile .ic{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.group-tile .name{ font-weight:700; font-size:14px; }
.group-tile .spend{ font-size:12px; color:var(--muted); }
.group-tile .tile-actions{ position:absolute; top:10px; right:10px; display:flex; gap:4px; opacity:0; transition:opacity var(--dur); }
.group-tile:hover .tile-actions{ opacity:1; }

/* ============ Budgets ============ */
.budget-row{ padding:16px 18px; border-top:1px solid var(--line); }
.budget-row:first-child{ border-top:none; }
.budget-row .top{ display:flex; justify-content:space-between; font-size:13.5px; font-weight:700; margin-bottom:8px; }
.budget-row .bar{ height:8px; border-radius:999px; background:var(--bg); overflow:hidden; }
.budget-row .bar .fill{ height:100%; border-radius:999px; background:var(--accent); transition:width var(--dur) var(--ease); }
.budget-row .bar .fill.over{ background:var(--coral); }
.budget-row .sub{ font-size:12px; color:var(--muted); margin-top:6px; }

/* ============ Currency table ============ */
.settings-section{ margin-bottom:24px; padding:20px; }
.settings-section h3{ font-size:15px; margin-bottom:14px; }
.cur-row{ display:grid; grid-template-columns:56px 1fr 90px 100px 40px; gap:10px; align-items:center; padding:8px 0; font-size:13.5px; }
.cur-row.head{ color:var(--muted); font-weight:700; font-size:12px; }
.theme-toggle{ display:flex; align-items:center; gap:10px; }
.switch{ width:44px; height:24px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; border:none; flex-shrink:0; }
.switch::after{ content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; left:3px; transition:transform var(--dur) var(--ease); box-shadow:0 1px 3px rgba(0,0,0,.3); }
.switch.on{ background:var(--accent); }
.switch.on::after{ transform:translateX(20px); }

/* ============ Modal ============ */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(6,15,12,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  animation: fadein var(--dur) var(--ease);
}
.modal{ width:100%; max-width:460px; padding:26px; max-height:88vh; overflow-y:auto; }
.modal h3{ font-size:18px; margin-bottom:18px; }
.modal .form-grid{ display:flex; flex-direction:column; gap:14px; }
.modal .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
.type-toggle{ display:flex; background:var(--bg); border-radius:12px; padding:4px; }
.type-toggle button{ flex:1; padding:9px; border-radius:9px; border:none; background:transparent; font-weight:700; font-size:13px; cursor:pointer; color:var(--muted); }
.type-toggle button.active-income{ background:var(--accent); color:#fff; }
.type-toggle button.active-expense{ background:var(--coral); color:#fff; }

.type-toggle button.active-transfer{ background:var(--info); color:#fff; }
.attach-drop{ border:1.5px dashed var(--line); border-radius:var(--radius-sm); padding:16px; text-align:center; font-size:13px; color:var(--muted); cursor:pointer; }
.attach-drop:hover{ border-color:var(--accent); color:var(--accent); }
.attach-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.attach-chip{ display:flex; align-items:center; gap:6px; padding:6px 10px; background:var(--bg); border-radius:999px; font-size:12px; }
.attach-chip button{ border:none; background:none; cursor:pointer; color:var(--coral); font-weight:700; }

/* ============ Toast ============ */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--ink); color:var(--bg); padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
  z-index:100; transition:all var(--dur) var(--ease); pointer-events:none; box-shadow:var(--shadow-lift);
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ============ Floating add + mobile bottom nav ============ */
.fab{
  position:fixed; bottom:26px; right:26px; width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:#fff; font-size:26px; border:none; box-shadow:var(--shadow-lift);
  cursor:pointer; display:none; align-items:center; justify-content:center; z-index:20;
  transition:transform var(--dur) var(--ease);
}
.fab:active{ transform:scale(.92); }

.bottom-nav{ display:none; }

@media (max-width: 860px){
  .sidebar{ display:none; }
  .fab{ display:flex; }
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--surface-glass); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); z-index:15; padding:8px 6px calc(env(safe-area-inset-bottom) + 6px);
  }
  .bottom-nav button{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10.5px; font-weight:700; color:var(--muted); padding:6px 2px; cursor:pointer;
  }
  .bottom-nav button.active{ color:var(--accent); }
  .bottom-nav .ic{ font-size:19px; }
  .view{ padding:18px 16px 110px; }
  .topbar{ padding:14px 16px; }
  .topbar h2{ font-size:17px; }
  .search-box{ display:none; }
  .chart-grid{ grid-template-columns:1fr; }
  .hero-money{ flex-direction:column; text-align:center; }
  .modal{ max-width:100%; }
}

.kbd-hint{ font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:2px 6px; font-family:var(--font-mono); }

</style>
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div id="auth-screen">
  <div class="auth-box card">
    <div class="auth-logo">🪙</div>
    <h1>Money</h1>
    <p class="sub">Your money, in a jar you can see.</p>

    <div class="auth-tabs">
      <button class="active" data-tab="login">Log In</button>
      <button data-tab="signup">Create New User</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="field">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <form id="signup-form" class="auth-form hidden">
      <div class="field">
        <label for="signup-username">Choose a Username</label>
        <input type="text" id="signup-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="signup-password">Choose a Password</label>
        <input type="password" id="signup-password" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="signup-password2">Confirm Password</label>
        <input type="password" id="signup-password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="app-shell" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="mark">M</div><span>Money</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="sidebar-user-chip"><div class="av"></div><div class="name"></div></div>
      <button class="btn btn-ghost btn-sm" id="btn-logout">🚪 Log Out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <h2 id="topbar-title">Home</h2>
      <div class="search-box">
        <span class="ic">🔍</span>
        <input type="text" id="global-search" placeholder="Search... (press /)">
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btn-logout-topbar">🚪 Log Out</button>
        <button class="switch" id="theme-switch" title="Dark Mode"></button>

<script>
/* db.js — IndexedDB wrapper. Falls back to localStorage if IndexedDB is unavailable. */

const DB_NAME = 'MoneyAppDB';
const DB_VERSION = 4;
const STORES = ['users', 'transactions', 'groups', 'budgets', 'currencies', 'accounts', 'reminders', 'currency_history', 'loans', 'investments', 'audit_logs'];

let _db = null;
let _useLocalFallback = false;

function openDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      _useLocalFallback = true;
      resolve(null);
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach((store) => {
        if (!db.objectStoreNames.contains(store)) {
          const os = db.createObjectStore(store, { keyPath: 'id' });
          if (store !== 'users') os.createIndex('userId', 'userId', { unique: false });
          if (store === 'transactions') os.createIndex('accountId', 'accountId', { unique: false });
        }
      });
    };
    req.onsuccess = (e) => {
      _db = e.target.result;
      resolve(_db);
    };
    req.onerror = () => {
      _useLocalFallback = true;
      resolve(null);
    };
  });
}

/* ---------- localStorage fallback helpers ---------- */
function lsGetAll(store) {
  try {
    return JSON.parse(localStorage.getItem('ls_' + store) || '[]');
  } catch (e) {
    return [];
  }
}
function lsSetAll(store, arr) {
  localStorage.setItem('ls_' + store, JSON.stringify(arr));
}

/* ---------- generic CRUD ---------- */
const DB = {
  async init() {
    await openDB();
  },

  async put(store, record) {
    if (_useLocalFallback) {
      const all = lsGetAll(store);
      const idx = all.findIndex((r) => r.id === record.id);
      if (idx >= 0) all[idx] = record;
      else all.push(record);
      lsSetAll(store, all);
      return record;
    }
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readwrite');
      tx.objectStore(store).put(record);
      tx.oncomplete = () => resolve(record);
      tx.onerror = () => reject(tx.error);
    });
  },

  async delete(store, id) {
    if (_useLocalFallback) {
      const all = lsGetAll(store).filter((r) => r.id !== id);
      lsSetAll(store, all);
      return true;
    }
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  },

  async getAll(store) {
    if (_useLocalFallback) return lsGetAll(store);
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  async getAllByUser(store, userId) {
    const all = await this.getAll(store);
    return all.filter((r) => r.userId === userId);
  },

  async get(store, id) {
    if (_useLocalFallback) return lsGetAll(store).find((r) => r.id === id) || null;
    return new Promise((resolve, reject) => {
      const tx = _db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
};

function uid(prefix = 'id') {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 9)}`;
}


/* auth.js — username/password auth with salted SHA-256 hashing (browser SubtleCrypto). */

const SESSION_KEY = 'moneyapp_session';

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf))
    .map((b) => b.toString(16).padStart(2, '0'))
    .join('');
}

function randomSalt() {
  const arr = crypto.getRandomValues(new Uint8Array(16));
  return Array.from(arr).map((b) => b.toString(16).padStart(2, '0')).join('');
}

const Auth = {
  currentUser: null,

  async createUser(username, password) {
    username = username.trim();
    if (!username || !password) throw new Error('Please fill in both fields.');
    const users = await DB.getAll('users');
    if (users.some((u) => u.username.toLowerCase() === username.toLowerCase())) {
      throw new Error('That username is already taken.');
    }
    const salt = randomSalt();
    const passwordHash = await sha256Hex(salt + password);
    const user = {
      id: uid('user'),
      username,
      passwordHash,
      salt,
      createdAt: Date.now(),
      settings: normalizeUserSettings({ defaultCurrency: 'USD', theme: 'light' }),
    };
    await DB.put('users', user);
    await seedDefaultsForUser(user.id);
    return user;
  },

  async login(username, password) {
    const users = await DB.getAll('users');
    const user = users.find((u) => u.username.toLowerCase() === username.trim().toLowerCase());
    if (!user) throw new Error('No account with that username.');
    const hash = await sha256Hex(user.salt + password);
    if (hash !== user.passwordHash) throw new Error('Wrong password.');
    this.currentUser = user;
    localStorage.setItem(SESSION_KEY, JSON.stringify({ userId: user.id }));
    return user;
  },

  async restoreSession() {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    try {
      const { userId } = JSON.parse(raw);
      const user = await DB.get('users', userId);
      if (user) {
        user.settings = normalizeUserSettings(user.settings);
        this.currentUser = user;
      }
      return user;
    } catch (e) {
      return null;
    }
  },

  logout() {
    this.currentUser = null;
    localStorage.removeItem(SESSION_KEY);
  },

  async saveUser(user) {
    await DB.put('users', user);
    this.currentUser = user;
  },
};

/* Give every new user a starter set of groups and currencies so the app isn't empty. */
async function seedDefaultsForUser(userId) {
  const incomeGroups = [
    { name: 'Salary', icon: '💼', color: '#4C7A5A' },
    { name: 'Gift', icon: '🎁', color: '#3E7C74' },
    { name: 'Other Income', icon: '➕', color: '#767A3D' },
  ];
  const expenseGroups = [
    { name: 'Food', icon: '🍽️', color: '#8C3B4A' },
    { name: 'Transport', icon: '🚌', color: '#B5732E' },
    { name: 'Bills', icon: '🧾', color: '#4A5C82' },
    { name: 'Shopping', icon: '🛍️', color: '#A65A72' },
    { name: 'Health', icon: '💊', color: '#6B4C7A' },
    { name: 'Other', icon: '📦', color: '#C1633A' },
  ];
  for (const g of incomeGroups) {
    await DB.put('groups', { id: uid('grp'), userId, type: 'income', ...g });
  }
  for (const g of expenseGroups) {
    await DB.put('groups', { id: uid('grp'), userId, type: 'expense', ...g });
  }
  const currencies = [
    { code: 'USD', name: 'US Dollar', symbol: '$', rate: 1, isDefault: true },
    { code: 'EUR', name: 'Euro', symbol: '€', rate: 0.92 },
    { code: 'INR', name: 'Indian Rupee', symbol: '₹', rate: 83.3 },
  ];
  for (const c of currencies) {
    await DB.put('currencies', { id: uid('cur'), userId, ...c });
  }
}


/* currency.js — formatting & conversion helpers.
   Rates are stored as "units of this currency per 1 base unit" is NOT used;
   instead rate = value of 1 unit of this currency expressed in the user's base (default) currency's terms:
   we store rate = how many of this currency equal 1 default-currency unit (like a bank board rate).
   To convert an amount FROM currency A TO currency B: amount / rateA * rateB. */

const CurrencyUtil = {
  list: [], // currencies for current user
  defaultCode: 'USD',

  setAll(currencies) {
    this.list = currencies;
    const def = currencies.find((c) => c.isDefault);
    this.defaultCode = def ? def.code : (currencies[0] ? currencies[0].code : 'USD');
  },

  get(code) {
    return this.list.find((c) => c.code === code) || { code, symbol: code, rate: 1 };
  },

  symbol(code) {
    return this.get(code).symbol || code;
  },

  format(amount, code) {
    const c = this.get(code);
    const n = Number(amount || 0);
    const abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return `${n < 0 ? '-' : ''}${c.symbol}${abs}`;
  },

  // Convert amount from one currency to another using stored rates (rate = units per 1 default currency unit)
  convert(amount, fromCode, toCode) {
    if (fromCode === toCode) return Number(amount);
    const from = this.get(fromCode);
    const to = this.get(toCode);
    const fromRate = Number(from.rate) || 1;
    const toRate = Number(to.rate) || 1;
    const inDefault = Number(amount) / fromRate;
    return inDefault * toRate;
  },

  toDefault(amount, fromCode) {
    return this.convert(amount, fromCode, this.defaultCode);
  },
};


/* charts.js — thin wrappers around Chart.js for the dashboard & reports views. */

const ChartRegistry = {};

function destroyChart(key) {
  if (ChartRegistry[key]) {
    ChartRegistry[key].destroy();
    delete ChartRegistry[key];
  }
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function chartLibReady() {
  if (typeof Chart === 'undefined') {
    console.warn('Chart.js has not loaded (no internet on first load?). Charts will appear once it loads.');
    return false;
  }
  return true;
}

function renderIncomeExpenseBar(canvasId, labels, incomeData, expenseData) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Money In', data: incomeData, backgroundColor: cssVar('--accent'), borderRadius: 6, maxBarThickness: 26 },
        { label: 'Money Out', data: expenseData, backgroundColor: cssVar('--coral'), borderRadius: 6, maxBarThickness: 26 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: cssVar('--muted') } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
        y: { grid: { color: cssVar('--line') }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
      },
    },
  });
}

function renderGroupPie(canvasId, labels, data, colors) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (!data.length) return;
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: cssVar('--surface') }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10.5 }, color: cssVar('--muted') } } },
    },
  });
}

function renderTrendLine(canvasId, labels, data) {
  if (!chartLibReady()) return;
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, 'rgba(15,157,120,0.35)');
  gradient.addColorStop(1, 'rgba(15,157,120,0)');
  ChartRegistry[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total Money',
        data,
        borderColor: cssVar('--accent'),
        backgroundColor: gradient,
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: cssVar('--accent'),
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
        y: { grid: { color: cssVar('--line') }, ticks: { color: cssVar('--muted'), font: { size: 11 } } },
      },
    },
  });
}


/* app.js — main application controller */

const State = {

  groups: [],

  { id: 'home', label: 'Home', ic: '🏠' },

/* ---------------- Boot ---------------- */
window.addEventListener('DOMContentLoaded', boot);

async function boot() {
  await DB.init();
  await Auth.restoreSession();
  wireAuthScreen();
  if (Auth.currentUser) {
    await enterApp(Auth.currentUser);
  } else {
    showAuth();
  }
}

function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
}

async function enterApp(user) {
  State.user = user;
  State.user.settings = normalizeUserSettings(State.user.settings);
  State.theme = State.user.settings?.theme || 'light';
  State.dateFormat = State.user.settings?.dateFormat || 'DD/MM/YYYY';
  applyTheme(State.theme);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  await loadUserData();
  buildSidebar();
  checkReminders();
  wireShell();
  goTo('home');
}

async function loadUserData() {
  const uidVal = State.user.id;
  [State.transactions, State.groups, State.budgets, State.currencies, State.accounts, State.reminders, State.currencyHistory, State.loans, State.investments, State.auditLogs] = await Promise.all([
      DB.getAllByUser('transactions', uidVal),
      DB.getAllByUser('groups', uidVal),
      DB.getAllByUser('budgets', uidVal),
      DB.getAllByUser('currencies', uidVal),
      DB.getAllByUser('accounts', uidVal),
      DB.getAllByUser('reminders', uidVal),
      DB.getAllByUser('currency_history', uidVal),
      DB.getAllByUser('loans', uidVal),
      DB.getAllByUser('investments', uidVal),
      DB.getAllByUser('audit_logs', uidVal),
  ]);
  CurrencyUtil.setAll(State.currencies);
}

/* ---------------- Auth screen wiring ---------------- */
function wireAuthScreen() {
  const tabs = document.querySelectorAll('.auth-tabs button');
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  tabs.forEach((tab) => {
    tab.addEventListener('click', () => {
      tabs.forEach((t) => t.classList.remove('active'));
      tab.classList.add('active');
      const isLogin = tab.dataset.tab === 'login';
      loginForm.classList.toggle('hidden', !isLogin);
      signupForm.classList.toggle('hidden', isLogin);
      document.getElementById('auth-error').textContent = '';
    });
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    try {
      const user = await Auth.login(username, password);
      loginForm.reset();
      await enterApp(user);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('signup-username').value;
    const password = document.getElementById('signup-password').value;
    const password2 = document.getElementById('signup-password2').value;
    if (password !== password2) {
      document.getElementById('auth-error').textContent = 'Passwords do not match.';
      return;
    }
    try {
      const user = await Auth.createUser(username, password);
      await Auth.login(username, password);
      signupForm.reset();
      await enterApp(user);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    }
  });
}

/* ---------------- Sidebar & bottom nav ---------------- */
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(
    (item) => `<button class="nav-item" data-nav="${item.id}"><span class="ic">${item.ic}</span>${item.label}</button>`
  ).join('');
  nav.querySelectorAll('.nav-item').forEach((btn) => btn.addEventListener('click', () => goTo(btn.dataset.nav)));

  const chip = document.getElementById('sidebar-user-chip');
  chip.querySelector('.name').textContent = State.user.username;
  chip.querySelector('.av').textContent = State.user.username.slice(0, 1).toUpperCase();
}

function buildBottomNav() {
  const bn = document.getElementById('bottom-nav');
  const items = NAV_ITEMS.filter((n) => ['home', 'accounts', 'income', 'expenses', 'reminders'].includes(n.id));
  bn.innerHTML = items.map(
    (item) => `<button data-nav="${item.id}"><span class="ic">${item.ic}</span>${item.label}</button>`
  ).join('');
  bn.querySelectorAll('button').forEach((btn) => btn.addEventListener('click', () => goTo(btn.dataset.nav)));
}

function wireShell() {
  document.getElementById('btn-logout').addEventListener('click', () => {
    Auth.logout();
    location.reload();
  });
  document.getElementById('btn-logout-topbar')?.addEventListener('click', () => {
    Auth.logout();
    location.reload();
  });
  document.getElementById('fab-add').addEventListener('click', () => openTxModal());
  document.getElementById('btn-add-topbar').addEventListener('click', () => openTxModal());
  document.getElementById('global-search').addEventListener('input', (e) => {
    State.search = (e.target.value || '').trim().toLowerCase();
    renderView();
  });
  document.getElementById('theme-switch').addEventListener('click', toggleTheme);
  document.getElementById('theme-switch').classList.toggle('on', State.theme === 'dark');

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('modal-root').children.length) return;
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('global-search').focus();
    }
    if ((e.key === 'n' || e.key === 'N') && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      openTxModal();
    }
  });
}

function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  applyTheme(State.theme);
  document.getElementById('theme-switch').classList.toggle('on', State.theme === 'dark');
  State.user.settings = normalizeUserSettings(State.user.settings);
  State.user.settings.theme = State.theme;
  Auth.saveUser(State.user);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

function checkReminders() {
  const now = new Date();
  const dueReminders = State.reminders.filter(r => new Date(r.nextDueDate) <= now && r.status !== 'completed');
  if (dueReminders.length > 0) {
    // This provides a less intrusive notification, guiding the user to the Reminders page for manual approval.
    showToast(`${dueReminders.length} reminder(s) are due. Please review them.`);
  }
}

/* ---------------- Routing ---------------- */
function goTo(view, params = {}) {
  State.view = view;
  if (params.accountId) State.viewingAccountId = params.accountId;
  document.querySelectorAll('.nav-item').forEach((b) => b.classList.toggle('active', b.dataset.nav === view));
  document.querySelectorAll('#bottom-nav button').forEach((b) => b.classList.toggle('active', b.dataset.nav === view));
  document.getElementById('topbar-title').textContent = NAV_ITEMS.find((n) => n.id === view)?.label || '';
  renderView();
}

function renderView() {
  const root = document.getElementById('view-root');
  switch (State.view) {
    case 'home': root.innerHTML = renderHome(); afterRenderHome(); break;
    case 'accounts': root.innerHTML = renderAccounts(); afterRenderAccounts(); break;
    case 'account-details': root.innerHTML = renderAccountDetails(); afterRenderAccountDetails(); break;
    case 'income': root.innerHTML = renderTxList('income'); afterRenderTxList('income'); break;
    case 'expenses': root.innerHTML = renderTxList('expense'); afterRenderTxList('expense'); break;
    case 'transfers': root.innerHTML = renderTransfers(); afterRenderTransfers(); break;
    case 'reports': root.innerHTML = renderReports(); afterRenderReports(); break;
    case 'loans': root.innerHTML = renderLoans(); afterRenderLoans(); break;
    case 'investments': root.innerHTML = renderInvestments(); afterRenderInvestments(); break;
    case 'currency-history': root.innerHTML = renderCurrencyHistory(); afterRenderCurrencyHistory(); break;
    case 'reminders': root.innerHTML = renderReminders(); afterRenderReminders(); break;
    case 'budgets': root.innerHTML = renderBudgets(); afterRenderBudgets(); break;
    case 'groups': root.innerHTML = renderGroups(); afterRenderGroups(); break;
    case 'settings': root.innerHTML = renderSettings(); afterRenderSettings(); break;
  }
}

/* ---------------- Helpers ---------------- */
function fmt(amount, code) { return CurrencyUtil.format(amount, code); }
function toDefault(amount, code) { return CurrencyUtil.toDefault(amount, code); }

/**
 * Calculates the total net worth across all accounts in the default currency.
 * This is the most accurate way to calculate the total money, as it correctly
 * sums up the balances of each account, avoiding inaccuracies from
 * multi-currency transfer reporting.
 */
function calculateTotalNetWorth() {
  return State.accounts.reduce((total, account) => total + getAccountBalance(account.id), 0);
}

function groupById(id) { return State.groups.find((g) => g.id === id); }
function monthKey(date) { const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; }
function monthLabel(key) { const [y, m] = key.split('-'); return new Date(y, m - 1).toLocaleString(undefined, { month: 'short', year: '2-digit' }); }

function totalsInDefault(txs) {
  let income = 0, expense = 0;
  txs.forEach((t) => {
    const v = getTransactionValue(t);
    if (t.type === 'income') income += v;
    else if (t.type === 'expense') expense += v;
  });
  return { income, expense, net: income - expense };
}

function getTransferGroups() {
  const grouped = new Map();
  State.transactions.filter((t) => t.isTransfer && t.transferId).forEach((leg) => {
    const existing = grouped.get(leg.transferId) || {
      id: leg.transferId,
      transferNumber: leg.transferNumber || '',
      referenceNumber: leg.referenceNumber || '',
      date: leg.date,
      description: leg.description || '',
      status: leg.status || 'pending',
      transferFee: Number(leg.transferFee || 0),
      exchangeRateUsed: Number(leg.exchangeRateUsed || 1),
      convertedAmount: Number(leg.convertedAmount || 0),
      transferAmount: Number(leg.transferAmount || 0),
      sourceAccountId: '',
      destinationAccountId: '',
      sourceCurrency: '',
      destinationCurrency: '',
      sourceDescription: '',
      destinationDescription: '',
      attachments: [],
      sourceLeg: null,
      destinationLeg: null,
    };
    if (leg.transferSide === 'source') {
      existing.sourceAccountId = leg.accountId;
      existing.sourceCurrency = leg.currency;
      existing.sourceDescription = leg.description || '';
      existing.sourceLeg = leg;
      existing.transferAmount = Number(leg.transferAmount || leg.amount || 0);
      existing.transferFee = Number(leg.transferFee || 0);
      existing.exchangeRateUsed = Number(leg.exchangeRateUsed || 1);
      existing.convertedAmount = Number(leg.convertedAmount || 0);
    } else {
      existing.destinationAccountId = leg.accountId;
      existing.destinationCurrency = leg.currency;
      existing.destinationDescription = leg.description || '';
      existing.destinationLeg = leg;
      existing.transferAmount = Number(leg.transferAmount || existing.transferAmount || 0);
      existing.transferFee = Number(leg.transferFee || existing.transferFee || 0);
      existing.exchangeRateUsed = Number(leg.exchangeRateUsed || existing.exchangeRateUsed || 1);
      existing.convertedAmount = Number(leg.convertedAmount || existing.convertedAmount || 0);
    }
    existing.attachments = [...new Set([...(existing.attachments || []), ...(leg.attachments || [])])];
    existing.status = leg.status || existing.status || 'pending';
    existing.date = leg.date || existing.date;
    existing.description = leg.description || existing.description || '';
    existing.transferNumber = leg.transferNumber || existing.transferNumber || '';
    existing.referenceNumber = leg.referenceNumber || existing.referenceNumber || '';
    grouped.set(leg.transferId, existing);
  });
  return Array.from(grouped.values()).filter((item) => item.sourceAccountId && item.destinationAccountId).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getInvestmentMetrics(investment) {
  const purchaseAmount = Number(investment.purchaseAmount || 0);
  const currentValue = Number(investment.currentValue || 0);
  const manualProfit = Array.isArray(investment.profitEntries)
    ? investment.profitEntries.reduce((sum, entry) => sum + Number(entry.amount || 0), 0)
    : 0;
  const derivedProfit = currentValue - purchaseAmount + manualProfit + Number(investment.profit || 0);
  const profitPercentage = purchaseAmount > 0 ? (derivedProfit / purchaseAmount) * 100 : 0;
  const purchaseDate = investment.purchaseDate ? new Date(investment.purchaseDate) : null;
  const monthsDiff = purchaseDate && !Number.isNaN(purchaseDate.getTime()) && purchaseAmount > 0 && currentValue > 0
    ? Math.max(1, (new Date().getTime() - purchaseDate.getTime()) / (1000 * 60 * 60 * 24 * 30))
    : 0;
  const monthlyGrowth = monthsDiff > 0 ? ((Math.pow(currentValue / Math.max(purchaseAmount, 1), 1 / monthsDiff) - 1) * 100) : 0;
  const yearlyGrowth = monthsDiff > 0 ? monthlyGrowth * 12 : 0;
  return { derivedProfit, profitPercentage, monthlyGrowth, yearlyGrowth, manualProfit };
}

function getAccountBalance(accountId) {
  const account = State.accounts.find((item) => item.id === accountId);
  if (!account) return 0;
  let balance = Number(account.openingBalance || 0);
  State.transactions.filter((t) => t.accountId === accountId).forEach((t) => {
    const isPostedTransfer = t.isTransfer ? t.status === 'completed' : true;
    if (!isPostedTransfer) return;
    const amountInDefault = getTransactionValue(t);
    if (t.type === 'income') balance += amountInDefault;
    else if (t.type === 'expense') balance -= amountInDefault;
  });
  return balance;
}

function getFileExtension(name) {

function formatFileSize(bytes) {
  if (!Number.isFinite(bytes) || bytes <= 0) return '0 KB';
  const units = ['B', 'KB', 'MB', 'GB'];
  let size = bytes;
  let unitIndex = 0;
  while (size >= 1024 && unitIndex < units.length - 1) {
    size /= 1024;
    unitIndex += 1;
  }
  return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
}

async function addFilesToAttachmentList(files, target, collectionKey = 'attachments') {
  const list = getAttachmentCollection(target);
  for (const file of files) {
    if (file.size > 8 * 1024 * 1024) {
      showToast(`${file.name} is too big (max 8MB)`);
      continue;
    }
    const dataUrl = await fileToDataUrl(file);
    const attachment = createAttachmentEntry(file, { dataUrl, transactionId: target?.id || null, transactionNumber: target?.transferNumber || target?.loanNumber || target?.investmentName || null });
    list.push(attachment);
  }
  if (target && target.id) {
    target.attachments = list;
  }
  return list;
}

async function handleAttachmentAction(action, collection, index, target, collectionKey = 'attachments') {
  if (!collection || !collection[index]) return;
  const item = collection[index];
  if (action === 'download') {
    if (item.dataUrl) {
      const link = document.createElement('a');
      link.href = item.dataUrl;
      link.download = item.name;
      link.click();
    }
    showToast('Download started');
    return;
  }
  if (action === 'rename') {
    const nextName = prompt('Rename file', item.name);
    if (!nextName) return;
    collection[index] = { ...item, name: nextName };
    if (target && target.id) target.attachments = collection;
    showToast('File renamed');
    renderView();
    return;
  }
  if (action === 'replace') {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf,.jpg,.jpeg,.png,.docx,.xlsx,.zip';
    input.onchange = async () => {
      const file = input.files?.[0];
      if (!file) return;
      const dataUrl = await fileToDataUrl(file);
      collection[index] = createAttachmentEntry(file, { ...item, name: file.name, type: file.type, size: file.size, dataUrl, uploadedAt: new Date().toISOString(), uploadedBy: State.user?.username || 'System' });
      if (target && target.id) target.attachments = collection;
      showToast('File replaced');
      renderView();
    };
    input.click();
    return;
  }
  if (action === 'delete') {
    if (!confirm('Delete this file?')) return;
    collection.splice(index, 1);
    if (target && target.id) target.attachments = collection;
    showToast('File deleted');
    renderView();
  }
}

function renderAttachmentToolbar(containerId, attachments, target, collectionKey = 'attachments') {
  const box = document.getElementById(containerId);
  if (!box) return;
  if (!attachments?.length) {
    box.innerHTML = '<div class="empty-state" style="padding:12px 0;"><p>No attachments yet.</p></div>';
    return;
  }
  box.innerHTML = attachments.map((attachment, index) => buildAttachmentActionHtml(attachment, index, collectionKey)).join('');
  box.querySelectorAll('[data-action]').forEach((button) => {
    button.addEventListener('click', async (event) => {
      event.preventDefault();
      const action = button.dataset.action;
      const index = Number(button.dataset.index || 0);
      await handleAttachmentAction(action, attachments, index, target, collectionKey);
    });
  });
  box.querySelectorAll('.attach-preview').forEach((button) => {
    button.addEventListener('click', async (event) => {
      event.preventDefault();
      const index = Number(button.dataset.index || 0);
      const item = attachments[index];
      if (!item) return;
      if (item.type.startsWith('image/')) {
        const win = window.open('', '_blank');
        win.document.write(`<img src="${item.dataUrl}" style="max-width:100%;" />`);
        return;
      }
      if (item.type === 'application/pdf' || String(item.name || '').toLowerCase().endsWith('.pdf')) {
        const win = window.open('', '_blank');
        win.document.write(`<iframe src="${item.dataUrl}" style="width:100%;height:100vh;border:none"></iframe>`);
      }
    });
  });
}

function getPreferredCurrencyCode() {
  return State.user?.settings?.defaultCurrency || CurrencyUtil.defaultCode || 'USD';
}

function getDateFormat() {
  return State.user?.settings?.dateFormat || State.dateFormat || 'DD/MM/YYYY';
}

function formatDateValue(dateValue) {
  if (!dateValue) return '';
  const d = new Date(dateValue);
  if (Number.isNaN(d.getTime())) return dateValue;
  const fmt = getDateFormat();
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  if (fmt === 'MM/DD/YYYY') return `${month}/${day}/${year}`;
  if (fmt === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
  return `${day}/${month}/${year}`;
}

function formatDateForInput(dateValue) {
  if (!dateValue) return '';
  const d = new Date(dateValue);
  if (Number.isNaN(d.getTime())) return dateValue;
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function compareDateValues(a, b) {
  const left = new Date(a || 0);
  const right = new Date(b || 0);
  if (Number.isNaN(left.getTime()) || Number.isNaN(right.getTime())) return 0;
  return left.getTime() - right.getTime();
}

function getTransactionValue(tx, toCode = getPreferredCurrencyCode()) {
  const code = toCode || getPreferredCurrencyCode();
  if (tx.baseCurrency && tx.baseAmount != null) {
    return CurrencyUtil.convert(Number(tx.baseAmount), tx.baseCurrency, code);
  }
  if (tx.convertedAmount != null && tx.exchangeRate && tx.originalCurrency && tx.originalCurrency !== tx.currency) {
    return CurrencyUtil.convert(Number(tx.convertedAmount), tx.currency || tx.originalCurrency, code);
  }
  return CurrencyUtil.convert(Number(tx.amount || 0), tx.currency, code);
}

function buildCurrencyHistoryEntry({ id, transactionId, moduleName, date, transactionNumber, originalCurrency, baseCurrency, exchangeRate, originalAmount, convertedAmount, status, userId }) {
  const difference = Number(convertedAmount || 0) - Number(originalAmount || 0);
  return {
    id: id || uid('ch'),
    userId: userId || State.user?.id,
    transactionId,
    moduleName,
    date,
    transactionNumber,
    originalCurrency,
    baseCurrency: baseCurrency || getPreferredCurrencyCode(),
    exchangeRate: Number(exchangeRate || 1),
    originalAmount: Number(originalAmount || 0),
    convertedAmount: Number(convertedAmount || 0),
    difference: Number(difference || 0),
    status: status || 'Completed',
    createdAt: Date.now(),
  };
}

async function saveCurrencyHistoryEntry(entry) {
  const record = buildCurrencyHistoryEntry(entry);

}

function getFilteredTransactionList(items, includeTransfers = false) {
  return items.filter((t) => {
    if (!includeTransfers && t.isTransfer) return false;
    if (State.filters.from) {
      const from = new Date(State.filters.from);
      const current = new Date(t.date || '');
      if (Number.isNaN(current.getTime()) || current < from) return false;
    }
    if (State.filters.to) {
      const to = new Date(State.filters.to);
      const current = new Date(t.date || '');
      if (Number.isNaN(current.getTime()) || current > to) return false;
    }
    if (State.filters.groupId && t.groupId !== State.filters.groupId) return false;
    if (State.search) {
      const haystack = [t.description, t.referenceNumber, t.transferNumber, groupById(t.groupId)?.name, State.accounts.find((a) => a.id === t.accountId)?.name, t.currency].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(State.search)) return false;
    }
    return true;
  });
}

function getFilteredTransfers() {
  return getTransferGroups().filter((item) => {
    const from = document.getElementById('rep-from')?.value || document.getElementById('transfer-from')?.value || State.filters.from || '';
    const to = document.getElementById('rep-to')?.value || document.getElementById('transfer-to')?.value || State.filters.to || '';
    const status = document.getElementById('transfer-status')?.value || '';
    const matchesFrom = !from || compareDateValues(item.date, from) >= 0;
    const matchesTo = !to || compareDateValues(item.date, to) <= 0;
    const matchesStatus = !status || (item.status || 'pending') === status;
    const matchesSearch = !State.search || [item.description, item.referenceNumber, item.transferNumber, item.sourceCurrency, item.destinationCurrency].join(' ').toLowerCase().includes(State.search);
    return matchesFrom && matchesTo && matchesStatus && matchesSearch;
  });
}

function getFilteredCurrencyHistory() {
  return State.currencyHistory.filter((item) => {
    if (State.search) {
      const haystack = [item.transactionNumber, item.moduleName, item.originalCurrency, item.baseCurrency, item.status].join(' ').toLowerCase();
      if (!haystack.includes(State.search)) return false;
    }
    return true;
  }).sort((a, b) => new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt));
}

/* The jar is the hero's signature element: a literal coin jar that fills up
   by how much of this month's money has stayed saved, instead of a generic
   ring gauge. Interior body spans y=24..122 (98px tall) inside the outline. */
function jarSvg(pct) {
  const top = 24, bodyH = 98;
  const liquidH = Math.max(0, (pct / 100) * bodyH);
  const liquidY = top + (bodyH - liquidH);
  return `
    <div class="jar-wrap">
      <svg class="jar-svg" viewBox="0 0 104 132" width="88" height="112">

async function approveReminder(reminderId) {
  const reminder = State.reminders.find(r => r.id === reminderId);
  if (!reminder) {
    showToast('Reminder not found.');
    return;
  }

  const txDetails = reminder.transactionDetails;
  const confirmMsg = `Are you sure you want to approve and record the transaction for "${reminder.title}"?`;
  if (!confirm(confirmMsg)) return;

  try {
    if (txDetails.isTransfer) {
      // Handle transfer reminder
      const { fromAccountId, toAccountId, fromAmount, fromCurrency, toAmount, toCurrency, description, referenceNumber, transferFee } = txDetails;
      const fromAccountName = State.accounts.find(a => a.id === fromAccountId).name;
      const toAccountName = State.accounts.find(a => a.id === toAccountId).name;
      const transferId = uid('trn');

      const transferDate = new Date().toISOString().slice(0, 10);
      const expenseLeg = { id: uid('tx'), userId: State.user.id, type: 'expense', accountId: fromAccountId, amount: fromAmount + (transferFee || 0), currency: fromCurrency, date: transferDate, description: `Transfer to ${toAccountName} ${description ? `(${description})` : ''}`, isTransfer: true, transferId, transferNumber: reminder.id, referenceNumber, transferFee, exchangeRateUsed: txDetails.exchangeRateUsed || 1, convertedAmount: txDetails.convertedAmount || toAmount, transferAmount: fromAmount, transferSide: 'source', status: 'completed', attachments: [], createdAt: Date.now() };
      const incomeLeg = { id: uid('tx'), userId: State.user.id, type: 'income', accountId: toAccountId, amount: toAmount, currency: toCurrency, date: transferDate, description: `Transfer from ${fromAccountName} ${description ? `(${description})` : ''}`, isTransfer: true, transferId, transferNumber: reminder.id, referenceNumber, transferFee, exchangeRateUsed: txDetails.exchangeRateUsed || 1, convertedAmount: txDetails.convertedAmount || toAmount, transferAmount: fromAmount, transferSide: 'destination', status: 'completed', attachments: [], createdAt: Date.now() };

      await DB.put('transactions', expenseLeg);
      await DB.put('transactions', incomeLeg);
      State.transactions.push(expenseLeg, incomeLeg);
      await saveCurrencyHistoryEntry(buildCurrencyHistoryEntry({ transactionId: transferId, moduleName: 'Transfer', date: transferDate, transactionNumber: reminder.id, originalCurrency: fromCurrency, baseCurrency: toCurrency, exchangeRate: txDetails.exchangeRateUsed || 1, originalAmount: fromAmount, convertedAmount: txDetails.convertedAmount || toAmount, status: 'Completed', userId: State.user.id }));

    } else {
      // Handle standard income/expense reminder
      const transactionRecord = {
        id: uid('tx'),
        userId: State.user.id,
        ...txDetails,
        date: new Date().toISOString().slice(0, 10),
        attachments: [],
        createdAt: Date.now(),
      };
      await DB.put('transactions', transactionRecord);
      State.transactions.push(transactionRecord);
    }

    // Update reminder status and next due date
    if (reminder.repeat === 'none') {
      reminder.status = 'completed';
    } else {
      const newDueDate = new Date(reminder.nextDueDate);
      const now = new Date();
      while (newDueDate <= now) {
        const { frequencyValue, frequencyUnit } = reminder;
        if (frequencyUnit === 'days') newDueDate.setDate(newDueDate.getDate() + frequencyValue);
        else if (frequencyUnit === 'weeks') newDueDate.setDate(newDueDate.getDate() + frequencyValue * 7);
        else if (frequencyUnit === 'months') newDueDate.setMonth(newDueDate.getMonth() + frequencyValue);
        else if (frequencyUnit === 'years') newDueDate.setFullYear(newDueDate.getFullYear() + frequencyValue);
      }
      reminder.nextDueDate = newDueDate.toISOString().slice(0, 10);
    }

    await DB.put('reminders', reminder);
    showToast(`Transaction for "${reminder.title}" has been recorded.`);
    renderView();

  } catch (err) {
    console.error('Failed to approve reminder:', err);
    showToast('Error recording transaction.');
  }
}

      <div class="field"><label>Status</label><select id="transfer-status-select"><option value="pending" ${existing?.status === 'pending' ? 'selected' : ''}>Pending</option><option value="approved" ${existing?.status === 'approved' ? 'selected' : ''}>Approved</option><option value="completed" ${existing?.status === 'completed' ? 'selected' : ''}>Completed</option><option value="cancelled" ${existing?.status === 'cancelled' ? 'selected' : ''}>Cancelled</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="transfer-save">Save Transfer</button>
    </div>
  `);
  const amountInput = document.getElementById('transfer-amount');
  const exchangeRateInput = document.getElementById('transfer-exchange-rate');
  const convertedInput = document.getElementById('transfer-converted-amount');
  const sourceCurrencySelect = document.getElementById('transfer-source-currency');
  const destinationCurrencySelect = document.getElementById('transfer-destination-currency');
  const recalc = () => {
    const amount = parseFloat(amountInput.value || '0');
    const rate = parseFloat(exchangeRateInput.value || '0');
    const fromCode = sourceCurrencySelect.value;
    const toCode = destinationCurrencySelect.value;
    if (fromCode === toCode) {
      convertedInput.value = amount.toFixed(2);
      return;
    }
    const fromCurrency = State.currencies.find((item) => item.code === fromCode);
    const toCurrency = State.currencies.find((item) => item.code === toCode);
    if (!fromCurrency || !toCurrency) {
      convertedInput.value = '0.00';
      return;
    }
    const calculated = rate > 0 ? amount * rate : amount;
    convertedInput.value = calculated.toFixed(2);
  };
  amountInput.addEventListener('input', recalc);
  exchangeRateInput.addEventListener('input', recalc);
  sourceCurrencySelect.addEventListener('change', recalc);
  destinationCurrencySelect.addEventListener('change', recalc);
  const renderTransferAttachments = () => {
    const box = document.getElementById('transfer-attach-list');
    if (!box) return;
    box.innerHTML = State.pendingAttachments.length ? State.pendingAttachments.map((attachment, index) => buildAttachmentActionHtml(attachment, index, 'attachments')).join('') : '<div class="empty-state" style="padding:0;"><p>No attachments yet.</p></div>';
    box.querySelectorAll('[data-action]').forEach((button) => {
      button.addEventListener('click', async (event) => {
        event.preventDefault();
        const action = button.dataset.action;
        const index = Number(button.dataset.index || 0);
        await handleAttachmentAction(action, State.pendingAttachments, index, { id: existing?.transferId || null }, 'attachments');
        renderTransferAttachments();
      });
    });
  };
  document.getElementById('transfer-attach-drop').addEventListener('click', () => document.getElementById('transfer-file').click());
  document.getElementById('transfer-file').addEventListener('change', async (event) => {
    const files = Array.from(event.target.files || []);
    if (!files.length) return;
    for (const file of files) {
      if (file.size > 8 * 1024 * 1024) { showToast(`${file.name} is too big (max 8MB)`); continue; }
      const dataUrl = await fileToDataUrl(file);
      State.pendingAttachments.push({ name: file.name, type: file.type || 'application/octet-stream', size: file.size, dataUrl, uploadedAt: new Date().toISOString(), uploadedBy: State.user?.username || 'System' });
    }
    renderTransferAttachments();
    event.target.value = '';
  });
  renderTransferAttachments();
  recalc();
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('transfer-save').addEventListener('click', async () => {
    const transferDate = document.getElementById('transfer-date').value;
    const referenceNumber = document.getElementById('transfer-reference').value.trim();
    const fromAccountId = document.getElementById('transfer-from-account').value;
    const toAccountId = document.getElementById('transfer-to-account').value;
    const transferAmount = parseFloat(document.getElementById('transfer-amount').value);
    const transferFee = parseFloat(document.getElementById('transfer-fee').value || '0');
    const sourceCurrency = document.getElementById('transfer-source-currency').value;
    const destinationCurrency = document.getElementById('transfer-destination-currency').value;
    const exchangeRateUsed = parseFloat(document.getElementById('transfer-exchange-rate').value);
    const convertedAmount = parseFloat(document.getElementById('transfer-converted-amount').value);
    const description = document.getElementById('transfer-description').value.trim();
    const status = document.getElementById('transfer-status-select').value;
    if (!transferDate || !fromAccountId || !toAccountId || !sourceCurrency || !destinationCurrency) { showToast('Please complete all required transfer fields'); return; }
    if (fromAccountId === toAccountId) { showToast('Transfers to the same account are not allowed'); return; }
    if (!transferAmount || transferAmount <= 0) { showToast('Transfer amount must be greater than zero'); return; }
    if (!exchangeRateUsed || exchangeRateUsed <= 0) { showToast('Exchange rate must be greater than zero'); return; }
    const fromAccount = State.accounts.find((account) => account.id === fromAccountId);
    const toAccount = State.accounts.find((account) => account.id === toAccountId);
    if (!fromAccount || !toAccount) { showToast('Please choose valid accounts'); return; }
    const fromBalance = getAccountBalance(fromAccountId);
    const sourceAmountInDefault = toDefault(transferAmount, sourceCurrency);
    const transferWouldReduceBalance = fromBalance - sourceAmountInDefault < 0;
    if (transferWouldReduceBalance && !fromAccount.allowOverdraft) { showToast('Insufficient funds for this transfer'); return; }
    const resolvedTransferNumber = transferNumber || generateTransferNumber();
    const transferId = existing?.transferId || uid('trf');
    const existingTransfer = State.transactions.find((transaction) => transaction.isTransfer && transaction.transferNumber === resolvedTransferNumber && transaction.transferId !== transferId);
    if (existingTransfer) { showToast('Duplicate transfer number detected'); return; }
    const sourceLeg = {
      id: existing?.sourceLeg?.id || uid('tx'),
      userId: State.user.id,
      type: 'expense',
      accountId: fromAccountId,
      amount: transferAmount + transferFee,
      currency: sourceCurrency,
      date: transferDate,
      description: description || `Transfer to ${toAccount?.name || 'destination'}`,
      isTransfer: true,
      transferId,
      transferNumber: resolvedTransferNumber,
      referenceNumber,
      transferFee,
      exchangeRateUsed,
      convertedAmount,
      transferAmount,
      transferSide: 'source',
      status,
      attachments: State.pendingAttachments,
      createdAt: existing?.sourceLeg?.createdAt || Date.now(),
    };
    const destinationLeg = {
      id: existing?.destinationLeg?.id || uid('tx'),
      userId: State.user.id,
      type: 'income',
      accountId: toAccountId,
      amount: convertedAmount || transferAmount,
      currency: destinationCurrency,
      date: transferDate,
      description: description || `Transfer from ${fromAccount?.name || 'source'}`,
      isTransfer: true,
      transferId,
      transferNumber: resolvedTransferNumber,
      referenceNumber,
      transferFee,
      exchangeRateUsed,
      convertedAmount,
      transferAmount,
      transferSide: 'destination',
      status,
      attachments: State.pendingAttachments,
      createdAt: existing?.destinationLeg?.createdAt || Date.now(),
    };
    await DB.put('transactions', sourceLeg);
    await DB.put('transactions', destinationLeg);
    State.transactions = State.transactions.filter((transaction) => transaction.transferId !== transferId && transaction.id !== sourceLeg.id && transaction.id !== destinationLeg.id).concat(sourceLeg, destinationLeg);
    const previousStatus = existing?.status || 'pending';
    const transferMeta = { id: transferId, userId: State.user.id, transferNumber: resolvedTransferNumber, referenceNumber, date: transferDate, description, transferAmount, sourceAccountId: fromAccountId, destinationAccountId: toAccountId, sourceCurrency, destinationCurrency, exchangeRateUsed, convertedAmount, transferFee, status, createdAt: Date.now() };
    if (previousStatus !== status) {
      recordAuditEvent('transfer_status_changed', { transferId, transferNumber: resolvedTransferNumber, fromStatus: previousStatus, toStatus: status, reason: description || 'No reason provided' });
    }
    const historyEntry = buildCurrencyHistoryEntry({
      id: uid('ch'),
      transactionId: transferId,
      moduleName: 'Transfer',
      date: transferDate,
      transactionNumber: resolvedTransferNumber,
      originalCurrency: sourceCurrency,
      baseCurrency: destinationCurrency,
      exchangeRate: exchangeRateUsed,
      originalAmount: transferAmount,
      convertedAmount: convertedAmount || transferAmount,
      status,
      userId: State.user.id,
    });
    await saveCurrencyHistoryEntry(historyEntry);
    closeModal();
    renderView();
    showToast('Transfer saved');
  });
}

function renderReportCharts(from, to, toCode) {
  const allNonTransferTxs = State.transactions.filter(t => !t.isTransfer);
  let periodList = allNonTransferTxs;
  if (from) periodList = periodList.filter((t) => t.date >= from);
  if (to) periodList = periodList.filter((t) => t.date <= to);
  const months = [...new Set(periodList.map((t) => monthKey(t.date)))].sort();
  const finalMonths = months.length ? months : (from ? [monthKey(from)] : [monthKey(new Date())]);
  const incomeData = finalMonths.map((mk) => periodList.filter((t) => t.type === 'income' && monthKey(t.date) === mk).reduce((s, t) => s + getTransactionValue(t, toCode), 0));
  const expenseData = finalMonths.map((mk) => periodList.filter((t) => t.type === 'expense' && monthKey(t.date) === mk).reduce((s, t) => s + getTransactionValue(t, toCode), 0));
  renderIncomeExpenseBar('rep-bar', finalMonths.map(monthLabel), incomeData, expenseData);
  const expenseGroups = State.groups.filter((g) => g.type === 'expense');
  const pieLabels = [], pieData = [], pieColors = [];
  expenseGroups.forEach((g) => {
    const sum = periodList.filter((t) => t.type === 'expense' && t.groupId === g.id).reduce((s, t) => s + getTransactionValue(t, toCode), 0);
    if (sum > 0) { pieLabels.push(g.name); pieData.push(Number(sum.toFixed(2))); pieColors.push(g.color); }
  });
  renderGroupPie('rep-pie', pieLabels, pieData, pieColors);
  let running = 0;
  if (from) {
    const beforeStart = allNonTransferTxs.filter(t => t.date < from);
    running = beforeStart.reduce((total, t) => {
      const val = getTransactionValue(t, toCode);
      return total + (t.type === 'income' ? val : -val);
    }, 0);
  }
  const lineData = finalMonths.map((mk, i) => {
    running += (incomeData[i] || 0) - (expenseData[i] || 0);
    return Number(running.toFixed(2));
  });
  renderTrendLine('rep-line', finalMonths.map(monthLabel), lineData);
}

function txRowHtml(t) {
  const g = t.isTransfer ? null : groupById(t.groupId);
  const account = State.accounts.find(a => a.id === t.accountId);
  const sign = t.type === 'income' ? '+' : '-';
  const cls = t.type === 'income' ? 'pos' : 'neg';
  const icon = t.isTransfer ? '🔄' : (g ? g.icon : '❓');
  const color = t.isTransfer ? 'var(--info)' : (g ? g.color : '#666');
  const bgColor = t.isTransfer ? 'var(--info-soft)' : (g ? g.color + '22' : '#ddd');

  let metaParts = [];
  if (t.isTransfer) {
    metaParts.push('Account Transfer');
  } else {
    metaParts.push(g ? g.name : 'No Group');
  }
  
  if (t.referenceNumber) {
    metaParts.push(`Ref: ${t.referenceNumber}`);
  }

  if (account && State.view !== 'account-details') {
    metaParts.push(account.name);
  }

  metaParts.push(formatDateValue(t.date));

  let metaHtml = metaParts.join(' · ');
  if (t.attachments?.length) {
    metaHtml += ` <span class="attach-badge">📎 ${t.attachments.length}</span>`;
  }

  return `
    <div class="tx-row" data-id="${t.id}">
      <div class="ic" style="background:${bgColor}; color:${color};">${icon}</div>
      <div class="info">
        <div class="desc">${escapeHtml(t.description || (g ? g.name : 'Transaction'))}</div>
        <div class="meta">${metaHtml}</div>
      </div>
      <div class="amt mono ${cls}">${sign}${fmt(t.amount, t.currency)}</div>
      <div class="row-actions">
        <button class="btn btn-icon btn-ghost btn-attach-tx" title="Attachments">📎</button>
        <button class="btn btn-icon btn-ghost btn-edit-tx" title="Edit" ${t.isTransfer ? 'disabled' : ''}>✏️</button>
        <button class="btn btn-icon btn-ghost btn-del-tx" title="Delete">🗑️</button>
      </div>
    </div>`;
}

function wireTxRowButtons() {
  document.querySelectorAll('.btn-attach-tx').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.tx-row').dataset.id;
      const tx = State.transactions.find((t) => t.id === id);
      openAttachmentManager(tx, tx.description || 'Attachments');
    });
  });
  document.querySelectorAll('.btn-edit-tx').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.tx-row').dataset.id;
      const tx = State.transactions.find((t) => t.id === id);
      if (tx.isTransfer) {
        showToast('Editing transfers is not supported. Please delete and create a new one.');
        return;
      }
      openTxModal(tx);
    });
  });
  document.querySelectorAll('.btn-del-tx').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      const id = e.target.closest('.tx-row').dataset.id;
      const txToDelete = State.transactions.find((t) => t.id === id);

      if (txToDelete.isTransfer) {
        if (!confirm('This is part of a transfer. Deleting it will also delete the other part. Continue?')) return;
        const otherLeg = State.transactions.find(t => t.transferId === txToDelete.transferId && t.id !== txToDelete.id);
        await DB.delete('transactions', txToDelete.id);
        if (otherLeg) await DB.delete('transactions', otherLeg.id);
        State.transactions = State.transactions.filter(t => t.transferId !== txToDelete.transferId);
        State.currencyHistory = State.currencyHistory.filter((entry) => entry.transactionId !== txToDelete.transferId && entry.transactionNumber !== txToDelete.transferNumber);
        await Promise.all(State.currencyHistory.filter((entry) => entry.transactionId === txToDelete.transferId || entry.transactionNumber === txToDelete.transferNumber).map((entry) => DB.delete('currency_history', entry.id)));
        showToast('Transfer deleted');
        renderView();
      } else {
        if (!confirm('Delete this transaction? This cannot be undone.')) return;
        await DB.delete('transactions', id);
        State.transactions = State.transactions.filter((t) => t.id !== id);
        showToast('Transaction deleted');
        renderView();
      }
    });
  });
}

function getFilteredTxList(type) {
  const label = type === 'income' ? 'Income' : 'Expenses';
  const groupsOfType = State.groups.filter((g) => g.type === type);
  let list = State.transactions.filter((t) => t.type === type && !t.isTransfer);

  if (State.filters.from) list = list.filter((t) => t.date >= State.filters.from);
  if (State.filters.to) list = list.filter((t) => t.date <= State.filters.to);
  if (State.filters.groupId) list = list.filter((t) => t.groupId === State.filters.groupId);
  if (State.search) list = list.filter((t) => (t.description || '').toLowerCase().includes(State.search) || (groupById(t.groupId)?.name || '').toLowerCase().includes(State.search));

  list.sort((a, b) => new Date(b.date) - new Date(a.date));
  return list;
}

function exportPdf(type) {

    return;
  }
  const { jsPDF } = jspdf;

  const password = prompt("Enter a password to protect the PDF, or leave blank for no protection:");

    });

function renderBudgets() {
  const expenseGroups = State.groups.filter((g) => g.type === 'expense');
  const thisMonthKey = monthKey(new Date());
  const rows = expenseGroups.map((g) => {
    const budget = State.budgets.find((b) => b.groupId === g.id);
    const spent = totalsInDefault(State.transactions.filter((t) => t.type === 'expense' && t.groupId === g.id && monthKey(t.date) === thisMonthKey)).expense;
    const limit = budget ? toDefault(budget.amount, budget.currency) : 0;
    const pct = limit > 0 ? Math.min(100, Math.round((spent / limit) * 100)) : 0;
    return `
      <div class="budget-row" data-group="${g.id}">
        <div class="top"><span>${g.icon} ${g.name}</span><span>${fmt(spent, CurrencyUtil.defaultCode)} ${limit ? '/ ' + fmt(limit, CurrencyUtil.defaultCode) : ''}</span></div>

        <div class="sub">${limit ? pct + '% used this month' : 'No limit set'} · <a href="#" class="set-budget-link" data-group="${g.id}">${limit ? 'Edit Limit' : 'Set Limit'}</a></div>
      </div>`;
  }).join('');

const GROUP_ICONS = ['💼','🎁','➕','🍽️','🚌','🧾','🛍️','💊','📦','🏠','🎓','🎮','✈️','🐾','💇','📱','🧘','🚗','🍕','☕'];
const GROUP_COLORS = ['#4C7A5A','#8C3B4A','#D6A23C','#3E7C74','#B5732E','#6B4C7A','#C1633A','#4A5C82','#767A3D','#A65A72'];

function afterRenderGroups() {
  document.getElementById('add-group-btn').addEventListener('click', () => openGroupModal());
  document.querySelectorAll('.edit-group').forEach((btn) => btn.addEventListener('click', (e) => {
    const id = e.target.closest('.group-tile').dataset.id;
    openGroupModal(groupById(id));
  }));
  document.querySelectorAll('.del-group').forEach((btn) => btn.addEventListener('click', async (e) => {
    const id = e.target.closest('.group-tile').dataset.id;
    const used = State.transactions.some((t) => t.groupId === id);
