  }));
}

function openGroupModal(existing) {
  const iconPicker = GROUP_ICONS.map((ic) => `<button type="button" class="icon-opt btn btn-icon ${existing?.icon === ic ? 'active-pick' : ''}" data-ic="${ic}" style="font-size:16px;">${ic}</button>`).join('');
  const colorPicker = GROUP_COLORS.map((c) => `<button type="button" class="color-opt" data-color="${c}" style="width:26px;height:26px;border-radius:50%;background:${c};border:2px solid ${existing?.color === c ? 'var(--ink)' : 'transparent'};cursor:pointer;"></button>`).join('');
  openModal(`
    <h3>${existing ? 'Edit Group' : 'Add Group'}</h3>
    <div class="form-grid">
      <div class="field"><label>Name</label><input type="text" id="group-name" value="${existing ? escapeHtml(existing.name) : ''}" placeholder="e.g. Groceries"></div>
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button type="button" id="g-type-income" class="${(!existing || existing.type==='income') ? 'active-income' : ''}">Income</button>
          <button type="button" id="g-type-expense" class="${existing?.type==='expense' ? 'active-expense' : ''}">Expense</button>
        </div>
      </div>
      <div class="field"><label>Icon</label><div style="display:flex; flex-wrap:wrap; gap:6px;">${iconPicker}</div></div>
      <div class="field"><label>Color</label><div style="display:flex; flex-wrap:wrap; gap:8px;">${colorPicker}</div></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="group-save">Save</button>
    </div>
  `);
  let picked = { type: existing?.type || 'income', icon: existing?.icon || GROUP_ICONS[0], color: existing?.color || GROUP_COLORS[0] };
  document.getElementById('g-type-income').addEventListener('click', () => { picked.type='income'; document.getElementById('g-type-income').className='active-income'; document.getElementById('g-type-expense').className=''; });
  document.getElementById('g-type-expense').addEventListener('click', () => { picked.type='expense'; document.getElementById('g-type-expense').className='active-expense'; document.getElementById('g-type-income').className=''; });
  document.querySelectorAll('.icon-opt').forEach((b) => b.addEventListener('click', () => { picked.icon = b.dataset.ic; document.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('active-pick')); b.classList.add('active-pick'); }));
  document.querySelectorAll('.color-opt').forEach((b) => b.addEventListener('click', () => { picked.color = b.dataset.color; document.querySelectorAll('.color-opt').forEach(x=>x.style.border='2px solid transparent'); b.style.border='2px solid var(--ink)'; }));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('group-save').addEventListener('click', async () => {
    const name = document.getElementById('group-name').value.trim();
    if (!name) { showToast('Please enter a name'); return; }
    const record = existing ? { ...existing, name, ...picked } : { id: uid('grp'), userId: State.user.id, name, ...picked };
    await DB.put('groups', record);
    State.groups = State.groups.filter((g) => g.id !== record.id).concat(record);
    closeModal(); renderView(); showToast('Group saved');
  });
}

function afterRenderSettings() {
  document.getElementById('settings-theme-switch').addEventListener('click', toggleTheme);
  document.getElementById('settings-theme-select')?.addEventListener('change', async (e) => {
    State.theme = e.target.value;
    applyTheme(State.theme);
    State.user.settings = normalizeUserSettings(State.user.settings);
    State.user.settings.theme = State.theme;
    await Auth.saveUser(State.user);
    renderView();
  });
  document.getElementById('settings-date-format')?.addEventListener('change', async (e) => {
    State.user.settings = normalizeUserSettings(State.user.settings);
    State.user.settings.dateFormat = e.target.value;
    State.dateFormat = e.target.value;
    await Auth.saveUser(State.user);
    renderView();
  });
  document.getElementById('settings-default-currency')?.addEventListener('change', async (e) => {
    State.user.settings = normalizeUserSettings(State.user.settings);
    State.user.settings.defaultCurrency = e.target.value;
    await Auth.saveUser(State.user);
    CurrencyUtil.setAll(State.currencies);
    renderView();
  });
  document.getElementById('add-currency-btn').addEventListener('click', openCurrencyModal);
  document.getElementById('change-password-btn').addEventListener('click', openChangePasswordModal);

  document.querySelectorAll('.cur-row[data-id]').forEach((row) => {
    const id = row.dataset.id;
    row.querySelector('.cur-rate').addEventListener('change', async (e) => {
      const c = State.currencies.find((x) => x.id === id);
      c.rate = parseFloat(e.target.value) || 1;
      await DB.put('currencies', c);
      showToast('Rate updated');
    });
    row.querySelector('.cur-default').addEventListener('change', async () => {
      for (const c of State.currencies) {
        c.isDefault = c.id === id;
        if (c.isDefault) c.rate = 1;
        await DB.put('currencies', c);
      }
      CurrencyUtil.setAll(State.currencies);
      State.user.settings = normalizeUserSettings(State.user.settings);
      State.user.settings.defaultCurrency = State.currencies.find((c) => c.isDefault)?.code || State.user.settings.defaultCurrency;
      await Auth.saveUser(State.user);
      renderView(); showToast('Default money type updated');
    });
    row.querySelector('.cur-del').addEventListener('click', async () => {
      const used = State.transactions.some((t) => t.currency === State.currencies.find(c=>c.id===id).code);
      if (used && !confirm('Transactions use this money type. Delete anyway?')) return;
      await DB.delete('currencies', id);
      State.currencies = State.currencies.filter((c) => c.id !== id);
      CurrencyUtil.setAll(State.currencies);
      renderView(); showToast('Money type removed');
    });
  });
}

function openCurrencyModal() {
  openModal(`
    <h3>Add Money Type</h3>
    <div class="form-grid">
      <div class="two-col">
        <div class="field"><label>Code</label><input type="text" id="cur-code" maxlength="6" placeholder="e.g. GBP" style="text-transform:uppercase;"></div>
        <div class="field"><label>Symbol</label><input type="text" id="cur-symbol" maxlength="3" placeholder="£"></div>
      </div>
      <div class="field"><label>Name</label><input type="text" id="cur-name" placeholder="e.g. British Pound"></div>
      <div class="field"><label>Rate (units per 1 default)</label><input type="number" id="cur-rate" step="0.0001" value="1"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="cur-save">Save</button>
    </div>
  `);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('cur-save').addEventListener('click', async () => {
    const code = document.getElementById('cur-code').value.trim().toUpperCase();
    const symbol = document.getElementById('cur-symbol').value.trim() || code;
    const name = document.getElementById('cur-name').value.trim();
    const rate = parseFloat(document.getElementById('cur-rate').value) || 1;
    if (!code || !name) { showToast('Please fill in code and name'); return; }
    if (State.currencies.some((c) => c.code === code)) { showToast('That code already exists'); return; }
    const record = { id: uid('cur'), userId: State.user.id, code, symbol, name, rate, isDefault: State.currencies.length === 0 };
    await DB.put('currencies', record);
    State.currencies.push(record);
    if (State.currencies.filter((c) => c.isDefault).length === 0) {
      record.isDefault = true;
      record.rate = 1;
    }
    CurrencyUtil.setAll(State.currencies);
    State.user.settings = normalizeUserSettings(State.user.settings);
    State.user.settings.defaultCurrency = State.currencies.find((c) => c.isDefault)?.code || State.user.settings.defaultCurrency;
    await Auth.saveUser(State.user);
    closeModal(); renderView(); showToast('Money type added');
  });
}

function openChangePasswordModal() {
  openModal(`
    <h3>Change Password</h3>
    <div class="form-grid">
      <div class="field"><label>Current Password</label><input type="password" id="cp-current"></div>
      <div class="field"><label>New Password</label><input type="password" id="cp-new"></div>
      <div class="field"><label>Confirm New Password</label><input type="password" id="cp-confirm"></div>
    </div>
    <div class="auth-error" id="cp-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="cp-save">Save</button>
    </div>
  `);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('cp-save').addEventListener('click', async () => {
    const current = document.getElementById('cp-current').value;
    const next = document.getElementById('cp-new').value;
    const confirmVal = document.getElementById('cp-confirm').value;
    const hash = await sha256Hex(State.user.salt + current);
    if (hash !== State.user.passwordHash) { document.getElementById('cp-error').textContent = 'Current password is wrong.'; return; }
    if (!next || next !== confirmVal) { document.getElementById('cp-error').textContent = 'New passwords do not match.'; return; }
    State.user.passwordHash = await sha256Hex(State.user.salt + next);
    await Auth.saveUser(State.user);
    closeModal(); showToast('Password changed');
  });
}

const REMINDER_TYPES = [
  { id: 'custom', name: 'Custom Reminder' },
  { id: 'bank_transfer', name: 'Bank Transfer', isTransfer: true },
  { id: 'rd_deposit', name: 'RD Deposit' },
  { id: 'fd_deposit', name: 'Fixed Deposit' },
  { id: 'cc_payment', name: 'Credit Card Payment' },
  { id: 'loan_payment', name: 'Loan Payment' },
  { id: 'cash_deposit', name: 'Cash Deposit' },
  { id: 'cash_withdrawal', name: 'Cash Withdrawal' },
];

function openReminderModal(existing) {
  const tx = existing?.transactionDetails || {};
  const accountOptions = State.accounts.map(a => `<option value="${a.id}" ${tx.accountId === a.id ? 'selected' : ''}>${a.name}</option>`).join('');
  const groupOptions = State.groups.map(g => `<option value="${g.id}" ${tx.groupId === g.id ? 'selected' : ''}>${g.icon} ${g.name}</option>`).join('');
  const currencyOptions = State.currencies.map(c => `<option value="${c.code}" ${((tx.currency) || CurrencyUtil.defaultCode) === c.code ? 'selected' : ''}>${c.code}</option>`).join('');
  const reminderTypeOptions = REMINDER_TYPES.map(rt => `<option value="${rt.id}" ${existing?.reminderType === rt.id ? 'selected' : ''}>${rt.name}</option>`).join('');
  const repeatOptions = ['none', 'daily', 'weekly', 'monthly', 'yearly'].map(o => `<option value="${o}" ${existing?.repeat === o ? 'selected' : ''}>${o.charAt(0).toUpperCase() + o.slice(1)}</option>`).join('');

  openModal(`
    <h3>${existing ? 'Edit' : 'Add'} Reminder</h3>
    <div class="form-grid">
      <div class="field"><label>Reminder Title</label><input type="text" id="rem-title" value="${existing?.title || ''}" placeholder="e.g. Monthly Rent"></div>
      <div class="field"><label>Reminder Type</label><select id="rem-type-select">${reminderTypeOptions}</select></div>
      <h4>Schedule</h4>
      <div class="two-col" style="align-items:end;">
        <div class="field"><label>First Due Date</label><input type="date" id="rem-start-date" value="${existing?.nextDueDate || new Date().toISOString().slice(0,10)}"></div>
        <div class="field"><label>Time (optional)</label><input type="time" id="rem-time" value="${existing?.time || ''}"></div>
      </div>
      <div class="field" id="rem-repeat-section"><label>Repeat</label><select id="rem-repeat">${repeatOptions}</select></div>
      <div id="reminder-details-form" class="form-grid" style="gap: 14px; margin-top: 14px;"></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="rem-save">Save Reminder</button></div>
  `);

  const renderReminderDetails = (typeId, details = {}) => {
    const formContainer = document.getElementById('reminder-details-form');
    const reminderType = REMINDER_TYPES.find(rt => rt.id === typeId);
    if (reminderType?.isTransfer) {
      formContainer.innerHTML = `<h4>Transfer Details</h4>
        <div class="two-col"><div class="field"><label>From Account</label><select id="rem-from-account">${accountOptions.replace(`value="${details.fromAccountId}"`, `value="${details.fromAccountId}" selected`)}</select></div><div class="field"><label>To Account</label><select id="rem-to-account">${accountOptions.replace(`value="${details.toAccountId}"`, `value="${details.toAccountId}" selected`)}</select></div></div>
        <div class="two-col"><div class="field"><label>Amount Sent</label><input type="number" id="rem-from-amount" value="${details.fromAmount || ''}" placeholder="0.00"></div><div class="field"><label>Currency</label><select id="rem-from-currency">${currencyOptions.replace(`value="${details.fromCurrency}"`, `value="${details.fromCurrency}" selected`)}</select></div></div>
        <div class="two-col"><div class="field"><label>Amount Received</label><input type="number" id="rem-to-amount" value="${details.toAmount || ''}" placeholder="0.00"></div><div class="field"><label>Currency</label><select id="rem-to-currency">${currencyOptions.replace(`value="${details.toCurrency}"`, `value="${details.toCurrency}" selected`)}</select></div></div>
        <div class="field"><label>Description</label><input type="text" id="rem-desc" value="${details.description || ''}" placeholder="Auto-generated transaction"></div>`;
    } else {
      formContainer.innerHTML = `<h4>Transaction Details</h4>
        <div class="field"><label>Type</label><div class="type-toggle"><button id="rem-tx-type-income" class="${details.type === 'income' ? 'active-income' : ''}">Income</button><button id="rem-tx-type-expense" class="${!details.type || details.type === 'expense' ? 'active-expense' : ''}">Expense</button></div></div>
        <div class="two-col"><div class="field"><label>Amount</label><input type="number" id="rem-amount" value="${details.amount || ''}" placeholder="0.00"></div><div class="field"><label>Currency</label><select id="rem-currency">${currencyOptions.replace(`value="${details.currency || CurrencyUtil.defaultCode}"`, `value="${details.currency || CurrencyUtil.defaultCode}" selected`)}</select></div></div>
        <div class="field"><label>Account</label><select id="rem-account">${accountOptions.replace(`value="${details.accountId}"`, `value="${details.accountId}" selected`)}</select></div>
        <div class="field"><label>Group</label><select id="rem-group">${groupOptions.replace(`value="${details.groupId}"`, `value="${details.groupId}" selected`)}</select></div>
        <div class="field"><label>Description</label><input type="text" id="rem-desc" value="${details.description || ''}" placeholder="Auto-generated transaction"></div>`;

      let currentType = details.type || 'expense';
      const incomeBtn = document.getElementById('rem-tx-type-income');
      const expenseBtn = document.getElementById('rem-tx-type-expense');
      incomeBtn.addEventListener('click', () => { currentType = 'income'; incomeBtn.className = 'active-income'; expenseBtn.className = ''; });
      expenseBtn.addEventListener('click', () => { currentType = 'expense'; expenseBtn.className = 'active-expense'; incomeBtn.className = ''; });
    }
  };

  const typeSelect = document.getElementById('rem-type-select');
  typeSelect.addEventListener('change', () => renderReminderDetails(typeSelect.value, {}));
  renderReminderDetails(existing?.reminderType || typeSelect.value, tx);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('rem-save').addEventListener('click', async () => {
    const repeatType = document.getElementById('rem-repeat').value;
    const freqUnitMap = { 'daily': 'days', 'weekly': 'weeks', 'monthly': 'months', 'yearly': 'years' };

    const record = {
      id: existing?.id || uid('rem'),
      userId: State.user.id,
      title: document.getElementById('rem-title').value,
      reminderType: document.getElementById('rem-type-select').value,
      nextDueDate: document.getElementById('rem-start-date').value,
      time: document.getElementById('rem-time').value,
      repeat: repeatType,
      frequencyValue: 1,
      frequencyUnit: repeatType !== 'none' ? freqUnitMap[repeatType] : 'days',
      status: existing?.status || 'active',
      transactionDetails: {}
    };

    const reminderType = REMINDER_TYPES.find(rt => rt.id === record.reminderType);
    if (reminderType?.isTransfer) {
      record.transactionDetails = {
        isTransfer: true,
        fromAccountId: document.getElementById('rem-from-account').value,
        toAccountId: document.getElementById('rem-to-account').value,
        fromAmount: parseFloat(document.getElementById('rem-from-amount').value),
        fromCurrency: document.getElementById('rem-from-currency').value,
        toAmount: parseFloat(document.getElementById('rem-to-amount').value),
        toCurrency: document.getElementById('rem-to-currency').value,
        description: document.getElementById('rem-desc').value,
      };
      if (!record.title || !record.nextDueDate || !record.transactionDetails.fromAmount || !record.transactionDetails.toAmount) { showToast('Please fill in title, due date, and amounts.'); return; }
    } else {
      record.transactionDetails = {
        type: document.querySelector('#reminder-details-form .type-toggle .active-income') ? 'income' : 'expense',
        amount: parseFloat(document.getElementById('rem-amount').value),
        currency: document.getElementById('rem-currency').value,
        accountId: document.getElementById('rem-account').value,
        groupId: document.getElementById('rem-group').value,
        description: document.getElementById('rem-desc').value,
      };
      if (!record.title || !record.nextDueDate || !record.transactionDetails.amount) { showToast('Please fill in title, due date, and amount.'); return; }
    }

    await DB.put('reminders', record);
    State.reminders = State.reminders.filter((r) => r.id !== record.id).concat(record);
    closeModal(); renderView(); showToast('Reminder saved');
  });
}

      </div>
      <div class="row-actions">
        <button class="btn btn-icon btn-ghost btn-del-chist" title="Delete">🗑️</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="filter-bar card" style="padding:14px 16px;">
      <div class="field"><label>Search</label><input type="text" id="ch-search" value="${State.search}"></div>
    </div>
    <div class="list-card card">
      <div class="list-head"><h3>Multi-Currency Transfer History</h3></div>
      ${rows || emptyState('💱', 'No currency exchange history', 'Transfers between different currencies will be logged here.')}
    </div>
  `;
}

function afterRenderCurrencyHistory() {
  document.getElementById('ch-search')?.addEventListener('input', (e) => {
    State.search = (e.target.value || '').trim().toLowerCase();
    renderView();
  });
  document.querySelectorAll('.btn-del-chist').forEach(btn => {
    btn.addEventListener('click', async e => {
      const id = e.target.closest('.tx-row').dataset.id;
      if (!confirm('Are you sure you want to delete this history entry? This cannot be undone.')) return;
      
      // Find the associated transfer transactions
      const historyEntry = State.currencyHistory.find(h => h.id === id);
      if (historyEntry && historyEntry.transferId) {
        const hasTxs = State.transactions.some(t => t.transferId === historyEntry.transferId);
        if (hasTxs) {
          if (!confirm('This will also delete the associated transfer transactions. Continue?')) {
            return;
          }
          // Delete associated transactions
          const txsToDelete = State.transactions.filter(t => t.transferId === historyEntry.transferId);
          for (const tx of txsToDelete) {
            await DB.delete('transactions', tx.id);
          }
          State.transactions = State.transactions.filter(t => t.transferId !== historyEntry.transferId);
        }
      }

      await DB.delete('currency_history', id);
      State.currencyHistory = State.currencyHistory.filter(h => h.id !== id);
      renderView();
      showToast('History entry and related transfers deleted.');
    });
  });
}

/* ================= Transaction Modal ================= */
function openTxModal(existing) {
  State.editingTxId = existing ? existing.id : null;
  State.pendingAttachments = existing ? [...(existing.attachments || [])] : [];
  const type = existing ? existing.type : 'expense';
  renderTxModalBody(type, existing);
}

function renderTxModalBody(type, existing) {
  const groupsOfType = State.groups.filter((g) => g.type === type);
  const accountOptions = State.accounts.map(a => `<option value="${a.id}" ${existing?.accountId === a.id ? 'selected' : ''}>${a.name} (${a.type})</option>`).join('');
  const defaultCode = existing?.baseCurrency || existing?.currency || getPreferredCurrencyCode();
  const currencyOptions = State.currencies.map((c) => `<option value="${c.code}" ${((existing?.currency)||defaultCode) === c.code ? 'selected' : ''}>${c.code}</option>`).join('');
  const dateVal = existing ? existing.date : new Date().toISOString().slice(0, 10);
  const showMultiCurrency = (existing?.currency || getPreferredCurrencyCode()) !== (existing?.baseCurrency || getPreferredCurrencyCode());

  openModal(`
    <h3>${existing ? 'Edit Transaction' : 'Add Transaction'}</h3>
    <div class="type-toggle" style="margin-bottom:16px;">
      <button type="button" id="tx-type-income" class="${type === 'income' ? 'active-income' : ''}">Income</button>
      <button type="button" id="tx-type-expense" class="${type === 'expense' ? 'active-expense' : ''}">Expense</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Account</label><select id="tx-account">${accountOptions.length ? accountOptions : '<option disabled>Please add an account first</option>'}</select></div>
      <div class="two-col">
        <div class="field"><label>Amount</label><input type="number" id="tx-amount" min="0" step="0.01" value="${existing ? existing.amount : ''}" placeholder="0.00"></div>
        <div class="field"><label>Money Type</label><select id="tx-currency">${currencyOptions}</select></div>
      </div>
      <div id="tx-multi-currency" class="two-col ${showMultiCurrency ? '' : 'hidden'}">
        <div class="field"><label>Exchange Rate</label><input type="number" id="tx-exchange-rate" min="0" step="0.0001" value="${existing?.exchangeRate || 1}"></div>
        <div class="field"><label>Converted Amount</label><input type="number" id="tx-converted-amount" min="0" step="0.01" value="${existing?.convertedAmount || existing?.baseAmount || ''}"></div>
      </div>
      <div id="tx-base-currency" class="field ${showMultiCurrency ? '' : 'hidden'}"><label>Base Currency Amount</label><input type="number" id="tx-base-amount" min="0" step="0.01" value="${existing?.baseAmount || ''}"></div>
      <div class="field"><label>What was it for</label><input type="text" id="tx-desc" value="${existing ? escapeHtml(existing.description || '') : ''}" placeholder="e.g. Coffee with friend"></div>
      <div class="two-col">
        <div class="field"><label>Group</label><select id="tx-group">${groupsOfType.map((g) => `<option value="${g.id}" ${existing?.groupId === g.id ? 'selected' : ''}>${g.icon} ${g.name}</option>`).join('')}</select></div>
        <div class="field"><label>Date</label><input type="date" id="tx-date" value="${dateVal}"></div>
      </div>
      <div class="field">
        <label>Attachments (bill, receipt, image, PDF, DOCX, XLSX, ZIP)</label>
        <div class="attach-drop" id="attach-drop">Tap to add a file</div>
        <input type="file" id="tx-file" class="hidden" multiple accept=".pdf,.jpg,.jpeg,.png,.docx,.xlsx,.zip,image/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/zip">
        <div class="attach-list" id="attach-list"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="tx-save">Save</button>
    </div>
  `);

  let currentType = type;
  const currencySelect = document.getElementById('tx-currency');
  const exchangeWrap = document.getElementById('tx-multi-currency');
  const baseWrap = document.getElementById('tx-base-currency');
  const updateMultiCurrencyVisibility = () => {
    const selectedCurrency = currencySelect.value;
    const defaultCode = getPreferredCurrencyCode();
    const isMulti = selectedCurrency && selectedCurrency !== defaultCode;
    exchangeWrap.classList.toggle('hidden', !isMulti);
    baseWrap.classList.toggle('hidden', !isMulti);
  };
  currencySelect.addEventListener('change', updateMultiCurrencyVisibility);
  updateMultiCurrencyVisibility();
  const switchType = (t) => {
    currentType = t;
    document.getElementById('tx-type-income').className = t === 'income' ? 'active-income' : '';
    document.getElementById('tx-type-expense').className = t === 'expense' ? 'active-expense' : '';
    const groupSel = document.getElementById('tx-group');
    const groups = State.groups.filter((g) => g.type === t);
    groupSel.innerHTML = groups.map((g) => `<option value="${g.id}">${g.icon} ${g.name}</option>`).join('');
  };
  document.getElementById('tx-type-income').addEventListener('click', () => switchType('income'));
  document.getElementById('tx-type-expense').addEventListener('click', () => switchType('expense'));

  renderAttachList();
  document.getElementById('attach-drop').addEventListener('click', () => document.getElementById('tx-file').click());
  document.getElementById('tx-file').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    for (const file of files) {
      if (file.size > 8 * 1024 * 1024) { showToast(`${file.name} is too big (max 8MB)`); continue; }
      const dataUrl = await fileToDataUrl(file);
      State.pendingAttachments.push({ name: file.name, type: file.type || 'application/octet-stream', size: file.size, dataUrl, uploadedAt: new Date().toISOString(), uploadedBy: State.user?.username || 'System' });
    }
    renderAttachList();
    e.target.value = '';
  });

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('tx-save').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('tx-amount').value);
    const accountId = document.getElementById('tx-account').value;
    const currency = document.getElementById('tx-currency').value;
    const description = document.getElementById('tx-desc').value.trim();
    const groupId = document.getElementById('tx-group').value;
    const date = document.getElementById('tx-date').value;
    const exchangeRate = parseFloat(document.getElementById('tx-exchange-rate')?.value || '1');
    const convertedAmount = parseFloat(document.getElementById('tx-converted-amount')?.value || '0');
    const baseAmount = parseFloat(document.getElementById('tx-base-amount')?.value || '0');
    const baseCurrency = getPreferredCurrencyCode();
    if (!amount || amount <= 0) { showToast('Please enter an amount'); return; }
    if (!groupId) { showToast('Please choose a group'); return; }
    if (!accountId) { showToast('Please choose an account'); return; }
    if (!date) { showToast('Please choose a date'); return; }

    const record = {
      id: State.editingTxId || uid('tx'),
      userId: State.user.id,
      type: currentType,
      amount, currency, description, groupId, date,
      accountId, attachments: State.pendingAttachments,
      exchangeRate: Number.isFinite(exchangeRate) && exchangeRate > 0 ? exchangeRate : 1,
      convertedAmount: Number.isFinite(convertedAmount) && convertedAmount > 0 ? convertedAmount : amount,
      baseAmount: Number.isFinite(baseAmount) && baseAmount > 0 ? baseAmount : amount,
      baseCurrency,
      originalAmount: amount,
      originalCurrency: currency,
      createdAt: existing ? existing.createdAt : Date.now(),
    };
    await DB.put('transactions', record);
    State.transactions = State.transactions.filter((t) => t.id !== record.id).concat(record);
    if (currency !== baseCurrency) {
      const historyEntry = buildCurrencyHistoryEntry({ transactionId: record.id, moduleName: 'Transaction', date, transactionNumber: record.id, originalCurrency: currency, baseCurrency, exchangeRate: record.exchangeRate, originalAmount: amount, convertedAmount: record.convertedAmount || amount, status: 'Completed' });
      await saveCurrencyHistoryEntry(historyEntry);
    }
    closeModal();
    renderView();
    showToast(State.editingTxId ? 'Transaction updated' : 'Transaction added');
  });
}

function renderAttachList() {
  const box = document.getElementById('attach-list');
  if (!box) return;
  box.innerHTML = State.pendingAttachments.length ? State.pendingAttachments.map((a, i) => buildAttachmentActionHtml(a, i, 'attachments')).join('') : '<div class="empty-state" style="padding:0;"><p>No attachments yet.</p></div>';
  box.querySelectorAll('[data-action]').forEach((btn) => {
    btn.addEventListener('click', async (event) => {
      event.preventDefault();
      const action = btn.dataset.action;
      const index = Number(btn.dataset.index || 0);
      await handleAttachmentAction(action, State.pendingAttachments, index, { id: State.editingTxId || null }, 'attachments');
      renderAttachList();
    });
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================= Generic Modal ================= */
function openModal(innerHtml) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal card">${innerHtml}</div></div>`;
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  State.editingTxId = null;
  State.viewingAccountId = null;
  State.pendingAttachments = [];
}

</script>
</body>
</html>
